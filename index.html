function darken(hex,f) {
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.round(r*(1-f)));g=Math.max(0,Math.round(g*(1-f)));b=Math.max(0,Math.round(b*(1-f)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function rRect(x,y,w,h,r,fill,stroke,lw=2){

}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let _ac=null;
function getAC(){
  if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended')_ac.resume();
  return _ac;
}
function _noise(sec,vol=0.35,decay=30){
  const a=getAC(),buf=a.createBuffer(1,Math.ceil(a.sampleRate*sec),a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/a.sampleRate*decay)*vol;
  const s=a.createBufferSource();s.buffer=buf;s.connect(a.destination);s.start();
}
function _tone(freq,type,sec,vol=0.3,sweep=null){
  const a=getAC(),o=a.createOscillator(),g=a.createGain(),now=a.currentTime;
  o.type=type;o.frequency.value=freq;
  if(sweep)o.frequency.exponentialRampToValueAtTime(sweep,now+sec);
  g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+sec);
  o.connect(g);g.connect(a.destination);o.start(now);o.stop(now+sec+0.05);
}
function snd_plop(){_tone(180,'sine',0.18,0.55,42);_noise(0.1,0.22,38);}
let _sq=0;
function snd_squirt(){const n=Date.now();if(n-_sq<85)return;_sq=n;_noise(0.07,0.18,55);}
function snd_fart(){_tone(105,'sawtooth',0.26,0.38,36);_noise(0.28,0.18,10);}
function snd_splat(){if(Math.random()>0.45)return;_noise(0.1,0.28,42);}
function snd_throne(){_tone(200,'sine',0.22,0.58,52);_noise(0.15,0.32,28);}
function snd_flush(){
  const a=getAC(),buf=a.createBuffer(1,Math.ceil(a.sampleRate*1.2),a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/a.sampleRate;d[i]=(Math.random()*2-1)*Math.min(t*4,1)*Math.exp(-(t-0.3)*3)*0.42;}
  const s=a.createBufferSource(),f=a.createBiquadFilter();
  f.type='bandpass';f.frequency.value=650;f.Q.value=0.5;
  s.buffer=buf;s.connect(f);f.connect(a.destination);s.start();
}
function snd_freeze(){_tone(2200,'sine',0.5,0.22,550);_noise(0.5,0.08,8);}
function snd_acid(){
  const a=getAC(),buf=a.createBuffer(1,Math.ceil(a.sampleRate*0.7),a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/a.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*2.8)*0.26*(1+0.7*Math.sin(2*Math.PI*55*t));}
  const s=a.createBufferSource(),f=a.createBiquadFilter();
  f.type='highpass';f.frequency.value=1600;s.buffer=buf;s.connect(f);f.connect(a.destination);s.start();
}

// ── META PROGRESSION ──────────────────────────────────────────────────────────
const MK='poop_meta';
function loadMeta(){try{return JSON.parse(localStorage.getItem(MK)||'{}');}catch{return{};}}
function saveMeta(d){try{localStorage.setItem(MK,JSON.stringify(d));}catch{}}
function recordRun(){
  const m=loadMeta();
  m.hs=Math.max(m.hs||0,score); m.bw=Math.max(m.bw||0,waveIdx);
  m.runs=(m.runs||0)+1;
  const ck=`ch${currentChapter+1}_best`;
  if(!m[ck]||score>(m[ck].s||0))m[ck]={w:waveIdx,s:score};
  saveMeta(m);
}

function genShop(){
  shopOffers=[...UPGRADES].sort(()=>Math.random()-0.5).slice(0,3);
}
function applyUpgrade(id){
  if(id==='dmg')dmgMult=Math.min(dmgMult+0.25,2.5);
  else if(id==='rate')rateMult=Math.min(rateMult+0.20,2.0);
  else if(id==='life'&&lives<5)lives++;
  else if(id==='gold')gold+=60;
  else if(id==='pressure')pressure=clamp(pressure-MAX_P*0.2,0,MAX_P);
  else if(id==='splash')splashMult=Math.min(splashMult+0.30,2.5);
}

function getChapter(w){
  if(w<3) return{n:1,name:'THE SEWERS'};
  if(w<6) return{n:2,name:'PUBLIC TOILET'};
  if(w<9) return{n:3,name:'BIO LAB'};
  if(w<12)return{n:4,name:'MUTANT COLLECTOR'};
  if(w<15)return{n:5,name:'INFERNAL DRAIN'};
  return{n:6,name:'FINAL FLUSH'};
}

// ── IMPACT VFX ────────────────────────────────────────────────────────────────
let rings=[],dmgNums=[],screenFlash=0,screenFlashClr='#ffffff';
function addRing(x,y,clr,maxR=60,speed=200){rings.push({x,y,clr,r:6,maxR,speed,a:0.9});}
function dmgNum(x,y,txt,clr='#ff4444'){dmgNums.push({x,y,txt,clr,vy:-55,life:1,dec:1.8});}
function flashScreen(clr,strength=0.18){screenFlash=Math.max(screenFlash,strength);screenFlashClr=clr;}
function toast(txt,clr='#ffdd55'){toasts.push({text:txt,timer:3.5,clr});}
function updateVFX(dt){
  rings.forEach(r=>{r.r+=r.speed*dt;r.a=Math.max(0,r.a-(r.a/((r.maxR-r.r+1)*0.01+0.2))*dt*2.5);});
  rings=rings.filter(r=>r.r<r.maxR&&r.a>0.01);
  dmgNums.forEach(d=>{d.y+=d.vy*dt;d.vy*=0.88;d.life-=d.dec*dt;});
  dmgNums=dmgNums.filter(d=>d.life>0);
  screenFlash=Math.max(0,screenFlash-dt*6);
  toasts.forEach(t=>t.timer-=dt);
  toasts=toasts.filter(t=>t.timer>0);
}
function drawToasts(){
  toasts.forEach((t,i)=>{
    const a=Math.min(1,t.timer,3.5-t.timer*1.5+1.5);
    cx.globalAlpha=Math.max(0,a);
    rRect(20,FIELD_TOP+12+i*34,W-40,26,6,'rgba(0,0,0,0.88)','#886644',1.5);
    cx.fillStyle=t.clr;cx.font='bold 11px Orbitron,Arial';cx.textAlign='center';
    cx.fillText(t.text,W/2,FIELD_TOP+29+i*34,W-50);
    cx.globalAlpha=1;
  });
}
function drawVFX(){
  rings.forEach(r=>{
    cx.globalAlpha=r.a;cx.strokeStyle=r.clr;cx.lineWidth=3;
    cx.beginPath();cx.arc(r.x,r.y,r.r,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=r.a*0.3;cx.fillStyle=r.clr;
    cx.beginPath();cx.arc(r.x,r.y,r.r,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  });
  dmgNums.forEach(d=>{
    cx.globalAlpha=d.life;
    cx.font=`bold 16px Orbitron,Arial`;cx.textAlign='center';
    cx.strokeStyle='rgba(0,0,0,0.7)';cx.lineWidth=3;
    cx.strokeText(d.txt,d.x,d.y,80);
    cx.fillStyle=d.clr;cx.fillText(d.txt,d.x,d.y,80);
    cx.globalAlpha=1;
  });
  if(screenFlash>0.01){
    cx.fillStyle=screenFlashClr;cx.globalAlpha=screenFlash;
    cx.fillRect(0,0,W,H);cx.globalAlpha=1;
  }
}

}

// ── WAVE MANAGEMENT ───────────────────────────────────────────────────────────
function startWave(idx){
  waveIdx=idx; clearTimer=0;
  const def=WD[Math.min(idx,WD.length-1)];
  const bonus=idx>=WD.length?1+(idx-WD.length+1)*0.4:1;
  queues=def.map(g=>({t:g.t,rem:Math.round(g.n*bonus),iv:g.iv/Math.max(1,bonus*0.75),timer:0}));
}

// ── SHOOT ─────────────────────────────────────────────────────────────────────
function shoot(tx,ty){
  const m=Modes[modeIdx];
  if(modeIdx===0)snd_plop(); else if(modeIdx===1)snd_squirt(); else snd_fart();
  const dx=tx-TOWER_X,dy=ty-PIVOT_Y,d=Math.hypot(dx,dy)||1,a=Math.atan2(dy,dx);
  projs.push({
    x:TOWER_X+Math.cos(a)*BLEN, y:PIVOT_Y+Math.sin(a)*BLEN,
    vx:(dx/d)*m.spd, vy:(dy/d)*m.spd,
    dmg:m.dmg*dmgMult, splash:m.splash*splashMult, r:m.pr, clr:m.clr,
    mode:m.em, key:['chunk','auto','gas'][modeIdx], alive:true,
  });
}

function bestTarget(){
  if(!enemies.length)return null;
  if(aimActive){
    const adx=Math.cos(aimAngle),ady=Math.sin(aimAngle);
    let best=null,bestS=-Infinity;
    for(const e of enemies){
      const dx=e.x-TOWER_X,dy=e.y-PIVOT_Y,d=Math.hypot(dx,dy)||1;
      const s=(dx/d)*adx+(dy/d)*ady;
      if(s>bestS){bestS=s;best=e;}
    }
    return best;
  }
  let nearest=null,nd=Infinity;
  for(const e of enemies){const d=dist(TOWER_X,PIVOT_Y,e.x,e.y);if(d<nd){nd=d;nearest=e;}}
  return nearest;
}

// ── ULTIMATE ──────────────────────────────────────────────────────────────────
function triggerUlt(){
  if(ultActive)return;
  ultActive=true;ultTimer=1.8;
  lastUlt=ultIdx; ultIdx=(ultIdx+1)%ULTS.length;
  shake(25,0.75); pressure=0; pressureFullTimer=0;
  if(lastUlt===0){
    snd_flush(); hap([20,20,20,20,60]);
    // FLUSH — wipe all enemies
    let n=0;
    for(const e of enemies){
      gold+=e.reward;score+=e.reward;n++;
      burst(e.x,e.y,e.clr,14,200,8);
      burst(e.x,e.y,'#00e0ff',6,150,5);
      panels.push({x:e.x,y:e.y,text:'FLUSH!',life:1,dec:1.1,sc:0.3,rot:rnd(-0.2,0.2)});
    }
    enemies=[];
    if(n>0)floater(W/2,H/2-80,`FLUSHED ${n} ENEMIES!`,C.neonGreen);
  } else if(lastUlt===1){
    snd_freeze(); hap([30,15,30]);
    // FREEZE — slow all to 12% for 5 sec
    for(const e of enemies){
      e.origSpd=e.spd; e.spd*=0.12; e.frozen=true; e.frozenT=5;
      burst(e.x,e.y,'#44aaff',8,100,5);
    }
    floater(W/2,H/2-80,'❄ DEEP FREEZE! ❄','#44aaff');
  } else if(lastUlt===2){
    snd_acid();
    for(const e of enemies){e.acid=true;e.acidT=5;e.acidDmg=16;burst(e.x,e.y,'#88ff00',6,80,4);}
    floater(W/2,H/2-80,'☠ ACID RAIN! ☠','#88ff00');
  } else if(lastUlt===3){
    // OVERLOAD — 75% maxHp damage to all
    hap([60,20,60,20,100]);
    for(const e of enemies){
      e.hp-=e.maxHp*0.75;
      addRing(e.x,e.y,'#ff8800',e.r*5+50,320);
      burst(e.x,e.y,'#ff8800',14,220,8);
      if(e.hp<=0){e.dead=true;gold+=e.reward;score+=e.reward;}
    }
    enemies=enemies.filter(e=>!e.dead);
    shake(30,0.9);flashScreen('#ff6600',0.28);
    floater(W/2,H/2-80,'💥 OVERLOAD!','#ff8800');
    _tone(80,'sawtooth',0.6,0.5,20);
  } else if(lastUlt===4){
    // SWARM — 3× fire rate for 6s
    swarmTimer=6;swarming=true;
    flashScreen('#ffff00',0.15);
    floater(W/2,H/2-80,'⚡ SWARM! 6s','#ffff00');
    _tone(880,'square',0.12,0.2);
  } else {
    // GOLD RUSH — 5× gold for 20s
    goldRushTimer=20;
    flashScreen('#ffd700',0.12);
    floater(W/2,H/2-80,'💰 GOLD RUSH! 20s','#ffd700');
    _tone(660,'sine',0.15,0.18);
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt){
  if(gs!=='playing')return;
  waterOffset=(waterOffset+dt*18)%(Math.PI*2);
  updateVFX(dt);
  fireCd=Math.max(0,fireCd-dt);
  if(comboTimer>0){comboTimer-=dt;}else if(combo>0){combo=0;comboMult=1;}
  if(swarmTimer>0){swarmTimer-=dt;if(swarmTimer<=0){swarming=false;}}
  if(goldRushTimer>0)goldRushTimer-=dt;
  if(shakeT>0){shakeT-=dt;if(shakeT<=0)shakeI=0;}
  if(vigA>0)vigA=Math.max(0,vigA-dt*3);
  if(ultActive){ultTimer-=dt;if(ultTimer<=0)ultActive=false;}
  if(pressure>=MAX_P&&!ultActive){
    pressureFullTimer+=dt;
    if(pressureFullTimer>=30){pressureFullTimer=0;triggerUlt();}
    return;
  }
  pressureFullTimer=0;

  // Spawn
  for(const q of queues){
    if(q.rem<=0)continue;
    q.timer+=dt;
    while(q.timer>=q.iv&&q.rem>0){
      q.timer-=q.iv;q.rem--;
      if(q.t==='boss')snd_boss();
      const d=ED[q.t];
      enemies.push({
        t:q.t,x:rnd(40,W-40),y:rnd(H+5,H+38),
        hp:d.maxHp,maxHp:d.maxHp,spd:d.speed*rnd(0.88,1.12),
        r:d.r,clr:d.clr,rim:d.rim,
        reward:d.reward,pDmg:d.pDmg,pKill:d.pKill,armor:d.armor||0,
        wb:rnd(0,Math.PI*2),wbs:rnd(2,4),dead:false,
      });
    }
  }

  // Enemies
  for(const e of enemies){
    if(e.dead)continue;
    e.wb+=e.wbs*dt;
    if(e.frozen){e.frozenT-=dt;if(e.frozenT<=0){e.frozen=false;if(e.origSpd)e.spd=e.origSpd;}}
    if(e.acid){e.acidT-=dt;if(e.acidT>0){e.hp-=(e.acidDmg||8)*dt;}else{e.acid=false;}if(e.hp<=0&&!e.dead){e.dead=true;gold+=e.reward;score+=e.reward;pressure=clamp(pressure+e.pKill,0,MAX_P);burst(e.x,e.y,e.clr,10,160,7);floater(e.x,e.y-10,`+${e.reward}💰`,C.neonGold);continue;}}
    const dx=TOWER_X-e.x,dy=TOWER_Y-e.y,d=Math.hypot(dx,dy)||1;
    e.x+=(dx/d)*e.spd*dt; e.y+=(dy/d)*e.spd*dt;
    if(d<e.r+32){
      pressure=clamp(pressure+e.pDmg,0,MAX_P);
      burst(e.x,e.y,e.clr,8,160,8);
      burst(TOWER_X,TOWER_Y,'#ff3300',6,200,6);
      shake(e.t==='bacteria'?15:8,0.38);
      vigA=0.72;
      panels.push({x:TOWER_X+rnd(-45,45),y:TOWER_Y+70,
        text:PANEL_POOL.throne[Math.floor(Math.random()*PANEL_POOL.throne.length)],
        life:1,dec:1.2,sc:0.3,rot:rnd(-0.2,0.2)});
      floater(TOWER_X,TOWER_Y+90,`+${e.pDmg}💀`,C.neonRed);
      snd_throne(); hap(40);
      addRing(TOWER_X,TOWER_Y,'#ff3300',90,260);
      flashScreen('#ff0000',0.25);
      e.dead=true;
      if(pressure>=MAX_P){
        lives--;
        if(lives<=0){gs='game_over';recordRun();stopDrone();return;}
        pressure=70; // survive with reduced pressure
        hap([80,40,80]);
        floater(W/2,WATER_Y+60,`💔 LIFE LOST! ${lives} left`,'#ff4444');
        shake(20,0.5);
        return;
      }
    }
  }
  enemies=enemies.filter(e=>!e.dead);

  // Aim + fire
  const tgt=bestTarget();
  if(tgt){
    aimAngle=lerp(aimAngle,Math.atan2(tgt.y-PIVOT_Y,tgt.x-TOWER_X),0.18);
    if(fireCd<=0){fireCd=1/(Modes[modeIdx].rate*rateMult*(swarming?3:1));shoot(tgt.x,tgt.y);}
  }

  // Projectiles
  for(const p of projs){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.x<-80||p.x>W+80||p.y<-160||p.y>H+80){p.alive=false;continue;}
    for(const e of enemies){
      if(e.dead)continue;
      if(dist(p.x,p.y,e.x,e.y)<p.r+e.r){
        const dmg=p.dmg*(1-e.armor);
        e.hp-=dmg;
        burst(e.x,e.y,e.clr,5,130,5);
        if(p.splash>0){
          p.key==='gas'?
            (burst(p.x,p.y,'#22C55E',14,180,7),splatRing(p.x,p.y,p.splash,'rgba(30,160,0,0.35)'),addRing(p.x,p.y,'#22C55E',p.splash,300)):
            (burst(p.x,p.y,'#7B4020',16,200,7),splatRing(p.x,p.y,p.splash,'rgba(150,60,0,0.35)'),addRing(p.x,p.y,'#ff8800',p.splash,300));
          shake(9,0.28);
          for(const e2 of enemies)
            if(!e2.dead&&e2!==e&&dist(p.x,p.y,e2.x,e2.y)<p.splash)e2.hp-=p.dmg*(1-e2.armor)*0.6;
        }
        p.alive=false;
        if(e.hp<=0){
          e.dead=true;
          if(e.t==='blob'&&!e.split){
            for(let i=0;i<2;i++)enemies.push({t:'blob',x:e.x+rnd(-18,18),y:e.y+rnd(-18,18),hp:22,maxHp:22,spd:ED.blob.speed*1.4,r:13,clr:ED.blob.clr,rim:ED.blob.rim,reward:5,pDmg:7,pKill:3,armor:0.1,wb:rnd(0,Math.PI*2),wbs:rnd(2,4),dead:false,split:true});
            panels.push({x:e.x,y:e.y,text:'SPLIT!',life:1,dec:1.3,sc:0.3,rot:0.2});
          }
          const pg=Modes[modeIdx].pKill;
          pressure=clamp(pressure+pg,0,MAX_P);
          burst(e.x,e.y,e.clr,13,190,8);
          burst(e.x,e.y,'#ffd700',5,140,4);
          snd_splat();
          addRing(e.x,e.y,e.clr,e.r*4+40,180);
          dmgNum(e.x,e.y-e.r,`-${Math.round(p.dmg*(1-e.armor))}`,e.t==='boss'?'#ff2200':'#ffaa00');
          if(e.t==='boss')flashScreen('#ff2200',0.22);
          else if(e.t==='bacteria')flashScreen('#cc8800',0.10);
          combo++;comboTimer=2.2;comboMult=1+Math.min(combo*0.1,1.0);
          const earned=Math.round(e.reward*comboMult*(goldRushTimer>0?5:1));
          gold+=earned;score+=earned;
          if(combo>=3){floater(e.x,e.y-32,`${combo}x COMBO!`,'#ffdd00');}
          else floater(e.x,e.y-10,`+${earned}💰`,C.neonGold);
          floater(e.x+22,e.y-26,`+${pg}💩`,C.neonGreen);
          panel(e.x,e.y,p.key);
        }
        break;
      }
    }
  }
  projs  =projs.filter(p=>p.alive);
  enemies=enemies.filter(e=>!e.dead);

  // Tower fire
  for(const tw of towers){
    tw.cd=Math.max(0,tw.cd-dt);if(tw.cd>0)continue;
    const tt=TT[tw.type],lv=tw.level||0,sl=ALTAR_SLOTS[tw.slot];
    const tdmg=tt.dmg[lv],trate=tt.rate[lv],trange=tt.range[lv];
    let near=null,nd=Infinity;
    for(const e of enemies){const d=dist(sl.x,sl.y,e.x,e.y);if(d<nd&&d<trange){nd=d;near=e;}}
    if(!near)continue;
    tw.cd=1/trate;
    near.hp-=tdmg*(1-near.armor);
    burst(near.x,near.y,tt.clr,5,110,4);
    if(tt.slow&&!near.frozen){near.origSpd=near.spd;near.spd*=tt.slow;near.frozen=true;near.frozenT=2.5;}
    if(tt.dot&&!near.acid){near.acid=true;near.acidT=3;near.acidDmg=tdmg*0.4;}
    if(near.hp<=0){
      near.dead=true;
      snd_tower(tw.type);
      addRing(near.x,near.y,TT[tw.type].clr,near.r*3+30,200);
      if(near.t==='blob'&&!near.split){
        for(let i=0;i<2;i++)enemies.push({t:'blob',x:near.x+rnd(-18,18),y:near.y+rnd(-18,18),hp:22,maxHp:22,spd:ED.blob.speed*1.4,r:13,clr:ED.blob.clr,rim:ED.blob.rim,reward:5,pDmg:7,pKill:3,armor:0.1,wb:rnd(0,Math.PI*2),wbs:rnd(2,4),dead:false,split:true});
      }
      gold+=near.reward;score+=near.reward;
      pressure=clamp(pressure+near.pKill,0,MAX_P);
      burst(near.x,near.y,near.clr,12,180,7);
      floater(near.x,near.y-10,`+${near.reward}💰`,C.neonGold);
    }
  }
  enemies=enemies.filter(e=>!e.dead);

  for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=p.dec*dt;}
  parts=parts.filter(p=>p.life>0);
  for(const f of floaters){f.y+=f.vy*dt;f.vy*=0.88;f.life-=f.dec*dt;}
  floaters=floaters.filter(f=>f.life>0);
  for(const p of panels){p.sc=lerp(p.sc,1.0,0.22);p.life-=p.dec*dt;}
  panels=panels.filter(p=>p.life>0);

  if(queues.every(q=>q.rem<=0)&&enemies.length===0){
    gs='wave_clear';clearTimer=6+Math.floor(waveIdx/3)*2;snd_wave_clear();genShop();
    if(waveIdx>0&&waveIdx%4===0&&lives<5){lives++;floater(W/2,WATER_Y+40,'❤ EXTRA LIFE!','#ff6655');}
  }
}

// ── DRAW: TOILET INTERIOR BACKGROUND ─────────────────────────────────────────
function drawBg(){
  // Outside-bowl dark fill
  cx.fillStyle=C.bgOuter;
  cx.fillRect(0,0,W,H);

  // ── PORCELAIN BOWL INTERIOR ──
  // Fill the play field area with dirty porcelain
  cx.fillStyle=C.porcelain;
  cx.fillRect(0,FIELD_TOP,W,FIELD_BOT-FIELD_TOP);

  // Bowl curvature: radial dark vignette on the edges (simulates curved ceramic walls)
  const bCx=W/2, bCy=FIELD_TOP+(FIELD_BOT-FIELD_TOP)/2;
  const bowlGr=cx.createRadialGradient(bCx,bCy,60,bCx,bCy,230);
  bowlGr.addColorStop(0,  'rgba(255,248,220,0.18)');
  bowlGr.addColorStop(0.6,'rgba(0,0,0,0)');
  bowlGr.addColorStop(1,  'rgba(10,5,0,0.85)');
  cx.fillStyle=bowlGr;
  cx.fillRect(0,FIELD_TOP,W,FIELD_BOT-FIELD_TOP);

  // Porcelain tile grout lines
  cx.strokeStyle='rgba(140,110,60,0.25)'; cx.lineWidth=0.8;
  for(let x=0;x<=W;x+=44){cx.beginPath();cx.moveTo(x,FIELD_TOP);cx.lineTo(x,FIELD_BOT);cx.stroke();}
  for(let y=FIELD_TOP;y<=FIELD_BOT;y+=44){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

  // Old toilet stain RINGS (concentric ovals at 30%, 55%, 75% from center)
  const stainCy = bCy+40;
  for(let i=0;i<3;i++){
    const t=0.3+i*0.22;
    const rx=W*t*0.48, ry=(FIELD_BOT-FIELD_TOP)*t*0.46;
    cx.strokeStyle=`rgba(100,70,20,${0.18-i*0.04})`;
    cx.lineWidth=3+i*2;
    cx.beginPath(); cx.ellipse(W/2,stainCy,rx,ry,0,0,Math.PI*2); cx.stroke();
  }

  // Grime streaks from bottom (rising from drain)
  cx.strokeStyle='rgba(80,50,10,0.22)'; cx.lineWidth=2;
  const drips=[75,130,195,260,315];
  for(const dx of drips){
    cx.beginPath(); cx.moveTo(dx,FIELD_BOT-30);
    cx.bezierCurveTo(dx+rnd(-15,15),FIELD_BOT-80,dx+rnd(-15,15),FIELD_BOT-140,dx+rnd(-10,10),FIELD_BOT-180);
    cx.stroke();
  }

  // ── DRAIN PIPE at bottom center (where enemies come from) ──
  const drainY=FIELD_BOT-50, drainRx=52, drainRy=32;
  // Outer rust ring
  cx.fillStyle='rgba(80,40,0,0.7)';
  cx.beginPath(); cx.ellipse(W/2,drainY,drainRx+10,drainRy+7,0,0,Math.PI*2); cx.fill();
  // Pipe body
  cx.fillStyle='#3d1e00';
  cx.beginPath(); cx.ellipse(W/2,drainY,drainRx,drainRy,0,0,Math.PI*2); cx.fill();
  // Inner dark hole
  cx.fillStyle=C.drain;
  cx.beginPath(); cx.ellipse(W/2,drainY,drainRx-8,drainRy-6,0,0,Math.PI*2); cx.fill();
  // Pipe grate bars
  cx.strokeStyle='rgba(30,15,0,0.9)'; cx.lineWidth=3;
  for(let i=-2;i<=2;i++){
    const gx=W/2+i*14;
    cx.beginPath(); cx.moveTo(gx,drainY-drainRy+6); cx.lineTo(gx,drainY+drainRy-6); cx.stroke();
  }
  cx.beginPath(); cx.moveTo(W/2-drainRx+8,drainY-10); cx.lineTo(W/2+drainRx-8,drainY-10); cx.stroke();
  cx.beginPath(); cx.moveTo(W/2-drainRx+8,drainY+8);  cx.lineTo(W/2+drainRx-8,drainY+8);  cx.stroke();
  // Drip from drain hole
  cx.fillStyle='rgba(30,50,10,0.4)';
  for(let i=0;i<4;i++){
    const drip_x=W/2+(i-1.5)*18;
    cx.beginPath(); cx.ellipse(drip_x,drainY+drainRy+8+i*3,2,4+i*2,0,0,Math.PI*2); cx.fill();
  }

  // ── SEWER WATER (upper section — toilet bowl) ──
  // Water body
  cx.fillStyle=C.water;
  cx.fillRect(0,FIELD_TOP,W,WATER_Y-FIELD_TOP);

  // Animated wavy water surface (at bottom edge of water)
  cx.fillStyle=C.waterSurf;
  cx.beginPath();
  cx.moveTo(0,WATER_Y);
  for(let x=0;x<=W;x+=4){
    const y=WATER_Y+Math.sin((x*0.04)+waterOffset)*5+Math.sin((x*0.07)+waterOffset*1.4)*3;
    cx.lineTo(x,y);
  }
  cx.lineTo(W,FIELD_TOP); cx.lineTo(0,FIELD_TOP); cx.closePath(); cx.fill();

  // Foam / scum at water surface
  cx.strokeStyle=C.waterFoam; cx.lineWidth=2;
  cx.beginPath();
  for(let x=0;x<=W;x+=4){
    const y=WATER_Y+Math.sin((x*0.04)+waterOffset)*5+Math.sin((x*0.07)+waterOffset*1.4)*3;
    x===0?cx.moveTo(x,y):cx.lineTo(x,y);
  }
  cx.stroke();

  // Murky water depth gradient (darker at top)
  const waterGr=cx.createLinearGradient(0,FIELD_TOP,0,WATER_Y);
  waterGr.addColorStop(0,'rgba(0,0,0,0.5)');
  waterGr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=waterGr; cx.fillRect(0,FIELD_TOP,W,WATER_Y-FIELD_TOP);

  // Floating debris in water (near surface)
  cx.fillStyle='rgba(40,60,20,0.5)';
  const debris=[{x:60,y:WATER_Y-28},{x:150,y:WATER_Y-18},{x:280,y:WATER_Y-35},{x:330,y:WATER_Y-22}];
  for(const d of debris){
    const dx=d.x+Math.sin(waterOffset+d.x)*4;
    cx.beginPath(); cx.ellipse(dx,d.y,8,3,0.3,0,Math.PI*2); cx.fill();
  }

  // ── PORCELAIN RIM highlights on side walls ──
  const leftGr=cx.createLinearGradient(0,0,28,0);
  leftGr.addColorStop(0,'rgba(8,4,0,0.92)');
  leftGr.addColorStop(0.45,'rgba(210,185,130,0.25)');
  leftGr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=leftGr; cx.fillRect(0,FIELD_TOP,28,FIELD_BOT-FIELD_TOP);

  const rightGr=cx.createLinearGradient(W,0,W-28,0);
  rightGr.addColorStop(0,'rgba(8,4,0,0.92)');
  rightGr.addColorStop(0.45,'rgba(210,185,130,0.25)');
  rightGr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=rightGr; cx.fillRect(W-28,FIELD_TOP,28,FIELD_BOT-FIELD_TOP);
  // Subtle chapter atmosphere tint
  const _ct=['rgba(0,16,0,0.07)','rgba(16,12,0,0.07)','rgba(0,12,16,0.07)'];
  cx.fillStyle=_ct[Math.min(2,getChapter(waveIdx).n-1)];
  cx.fillRect(0,FIELD_TOP,W,FIELD_BOT-FIELD_TOP);
}

// ── DRAW: BUTT CANNON ─────────────────────────────────────────────────────────

  const tx=TOWER_X, ty=TOWER_Y;

  // Toilet seat rim at very top
  cx.fillStyle='#ede0c8'; cx.strokeStyle='#c8b090'; cx.lineWidth=8;
  cx.beginPath(); cx.ellipse(tx,ty-8,60,20,0,0,Math.PI); cx.fill(); cx.stroke();
  cx.strokeStyle='#fff8ec'; cx.lineWidth=2;
  cx.beginPath(); cx.ellipse(tx,ty-10,55,16,0,0,Math.PI); cx.stroke();

  cx.fillStyle='#f0b090'; cx.strokeStyle='#8B4513'; cx.lineWidth=2.5;
  cx.beginPath(); cx.ellipse(tx-24,ty+26,34,40,-0.08,0,Math.PI*2);

  cx.beginPath(); cx.ellipse(tx+32,ty+12,12,16,0.3,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;

  // Crack shadow
  const crackGr=cx.createLinearGradient(tx-10,ty,tx+10,ty);
  crackGr.addColorStop(0,'rgba(0,0,0,0)');
  crackGr.addColorStop(0.5,'rgba(55,12,0,0.28)');
  crackGr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=crackGr;
  cx.fillRect(tx-10,ty-2,20,PIVOT_Y-ty+10);

  // Butt crack line
  cx.strokeStyle='#6B2F0A'; cx.lineWidth=2.5;
  cx.beginPath();
  cx.moveTo(tx,ty+2);
  cx.bezierCurveTo(tx+4,ty+20,tx+3,ty+34,tx,PIVOT_Y-2);
  cx.stroke();

  // Anus (firing point)
  cx.fillStyle='#4a1a06'; cx.strokeStyle='#2a0a02'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(tx,PIVOT_Y,11,0,Math.PI*2); cx.fill(); cx.stroke();
  cx.fillStyle='#1a0600';
  cx.beginPath(); cx.arc(tx,PIVOT_Y,6,0,Math.PI*2); cx.fill();
  cx.strokeStyle='rgba(180,80,30,0.45)'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(tx,PIVOT_Y,11,0,Math.PI*2); cx.stroke();

  // Muzzle flash from anus
  const m=Modes[modeIdx];
  const flashRatio=fireCd>0?Math.min(1,fireCd*4*(m.rate<1?m.rate:1)):0;
  if(flashRatio>0.05){
    cx.globalAlpha=flashRatio*0.8;
    const fGr=cx.createRadialGradient(tx,PIVOT_Y,0,tx,PIVOT_Y,30);
    fGr.addColorStop(0,m.clr); fGr.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=fGr; cx.beginPath(); cx.arc(tx,PIVOT_Y,30,0,Math.PI*2); cx.fill();
    cx.globalAlpha=flashRatio;
    cx.fillStyle=m.clr; cx.beginPath(); cx.arc(tx,PIVOT_Y,14,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(255,255,255,0.7)';
    cx.beginPath(); cx.arc(tx,PIVOT_Y,6,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
  }

  // Pressure cracks on cheeks
  if(pressure>65){
    const ca=(pressure-65)/35;
    cx.strokeStyle=`rgba(220,38,38,${ca*0.65})`; cx.lineWidth=1.5;
    cx.beginPath();
    cx.moveTo(tx-30,ty+18); cx.lineTo(tx-18,ty+36);
    cx.moveTo(tx+32,ty+15); cx.lineTo(tx+20,ty+33);
    cx.stroke();
  }

  // Steam vents at high pressure
  if(pressure>80){
    const sv=(pressure-80)/20,t=Date.now()*0.003;
    cx.globalAlpha=sv*0.5;
    for(let i=0;i<3;i++){
      const sx=tx+(i===0?-36:i===2?36:0);
      for(let j=0;j<3;j++){
        cx.fillStyle=`rgba(200,200,200,${0.4-j*0.12})`;
        cx.beginPath();
        cx.arc(sx+Math.sin(t+j)*4,ty-(j*13)+Math.sin(t*1.5)*3,4+j*2,0,Math.PI*2);
        cx.fill();
      }
    }
    cx.globalAlpha=1;
  }

  // Ult picker buttons
  if(pressure>=MAX_P&&!ultActive){
    const ultBtns=[{x:tx-58,y:PIVOT_Y+85},{x:tx,y:PIVOT_Y+75},{x:tx+58,y:PIVOT_Y+85}];
    ULTS.forEach((u,i)=>{
      const b=ultBtns[i],sel=(i===ultIdx);
      cx.fillStyle=sel?u.clr:'#1a1a1a';cx.strokeStyle=u.clr;cx.lineWidth=sel?2.5:1.5;
      cx.beginPath();cx.arc(b.x,b.y,22,0,Math.PI*2);cx.fill();cx.stroke();
      if(sel){cx.shadowColor=u.clr;cx.shadowBlur=12;}
      cx.font='17px Arial';cx.textAlign='center';cx.fillText(u.em,b.x,b.y+6);
      cx.shadowBlur=0;
      cx.fillStyle=sel?'#ffffff':'#888888';cx.font='bold 6px Orbitron,Arial';
      cx.fillText(u.name,b.x,b.y+20,40);
    });
  }
  // Ultimate ready pulse
  if(pressure>=MAX_P&&!ultActive){
    const pulse=(Math.sin(Date.now()*0.007)*0.5+0.5);
    cx.strokeStyle=`rgba(0,224,200,${0.55+pulse*0.45})`;
    cx.lineWidth=4+pulse*3;
    cx.shadowColor='#00e0c8'; cx.shadowBlur=20;
    cx.beginPath(); cx.arc(tx,PIVOT_Y,55+pulse*10,0,Math.PI*2); cx.stroke();
    cx.shadowBlur=0;
    cx.fillStyle=`rgba(0,224,200,${0.85+pulse*0.15})`;
    cx.font='bold 13px Orbitron,Arial'; cx.textAlign='center';
    cx.strokeStyle='rgba(0,40,30,0.8)'; cx.lineWidth=3;
    const flushLabel=pressureFullTimer>0?`★ FLUSH! ★  ${Math.ceil(30-pressureFullTimer)}s`:'★ FLUSH! ★';
    cx.strokeText(flushLabel,tx,WATER_Y+40,W-40);
    cx.fillText(flushLabel,tx,WATER_Y+40,W-40);
  }
}

// ── DRAW: ENEMIES ─────────────────────────────────────────────────────────────
function drawVirus(e){
  const wx=Math.sin(e.wb)*2,wy=Math.cos(e.wb*0.8)*1.5;
  const ex=e.x+wx,ey=e.y+wy;
  // Spikes
  cx.fillStyle=e.rim;
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+e.wb*0.22;
    const tip={x:ex+Math.cos(a)*(e.r+9),y:ey+Math.sin(a)*(e.r+9)};
    const L={x:ex+Math.cos(a-0.3)*e.r,y:ey+Math.sin(a-0.3)*e.r};
    const R={x:ex+Math.cos(a+0.3)*e.r,y:ey+Math.sin(a+0.3)*e.r};
    cx.beginPath();cx.moveTo(L.x,L.y);cx.lineTo(tip.x,tip.y);cx.lineTo(R.x,R.y);cx.closePath();cx.fill();
  }
  // Body
  cx.fillStyle=e.clr;cx.strokeStyle=e.rim;cx.lineWidth=2.5;
  cx.beginPath();cx.arc(ex,ey,e.r,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='rgba(255,255,255,0.2)';
  cx.beginPath();cx.arc(ex-e.r*0.3,ey-e.r*0.32,e.r*0.44,0,Math.PI*2);cx.fill();
  // Angry central eye
  cx.fillStyle='#cc1100';
  cx.beginPath();cx.arc(ex,ey,e.r*0.4,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ff6600';
  cx.beginPath();cx.arc(ex-1,ey-2,e.r*0.2,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#cc1100';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(ex-e.r*0.32,ey-e.r*0.62);cx.lineTo(ex-e.r*0.06,ey-e.r*0.46);cx.stroke();
  cx.beginPath();cx.moveTo(ex+e.r*0.32,ey-e.r*0.62);cx.lineTo(ex+e.r*0.06,ey-e.r*0.46);cx.stroke();
}

function drawWorm(e){
  const dx=TOWER_X-e.x,dy=TOWER_Y-e.y,d=Math.hypot(dx,dy)||1;
  const nx=dx/d,ny=dy/d;
  const nSegs=5,spc=e.r*1.3;
  for(let s=nSegs-1;s>=0;s--){
    const ox=e.x-nx*s*spc,oy=e.y-ny*s*spc;
    const sw=Math.sin(e.wb+s*0.85)*3.5,sh=Math.cos(e.wb*0.7+s)*2.5;
    const sr=e.r*(s===0?1.0:0.86-s*0.045);
    cx.fillStyle=s===0?e.clr:darken(e.clr,0.14*s);
    cx.strokeStyle=e.rim;cx.lineWidth=2;
    cx.beginPath();cx.arc(ox+sw,oy+sh,sr,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='rgba(255,255,255,0.12)';
    cx.beginPath();cx.arc(ox+sw-sr*0.28,oy+sh-sr*0.3,sr*0.42,0,Math.PI*2);cx.fill();
  }
  const hw=Math.sin(e.wb)*2,hh=Math.cos(e.wb*0.7)*1.5;
  const ew=e.r*0.24,eo=e.r*0.3;
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(e.x+hw-eo,e.y+hh-eo*0.5,ew,0,Math.PI*2);
  cx.arc(e.x+hw+eo,e.y+hh-eo*0.5,ew,0,Math.PI*2);cx.fill();
  cx.fillStyle='#1a0000';
  cx.beginPath();cx.arc(e.x+hw-eo,e.y+hh-eo*0.5,ew*0.52,0,Math.PI*2);
  cx.arc(e.x+hw+eo,e.y+hh-eo*0.5,ew*0.52,0,Math.PI*2);cx.fill();
}

function drawBacteria(e){
  const wx=Math.sin(e.wb)*2.2,wy=Math.cos(e.wb*0.7)*1.8;
  const ex=e.x+wx,ey=e.y+wy;
  // Animated armor ring
  const armRot=Date.now()*0.001;
  cx.strokeStyle='#d4c040';cx.lineWidth=4;
  cx.setLineDash([10,5]);cx.lineDashOffset=-armRot*30;
  cx.beginPath();cx.arc(ex,ey,e.r+6,0,Math.PI*2);cx.stroke();
  cx.setLineDash([]);
  // Body
  cx.fillStyle=e.clr;cx.strokeStyle=e.rim;cx.lineWidth=3;
  cx.beginPath();cx.arc(ex,ey,e.r,0,Math.PI*2);cx.fill();cx.stroke();
  // Stubby limbs
  const limbs=[-0.55,0.55,Math.PI-0.55,Math.PI+0.55];
  cx.fillStyle=darken(e.clr,0.3);
  for(const a of limbs){
    cx.beginPath();cx.ellipse(ex+Math.cos(a)*(e.r-3),ey+Math.sin(a)*(e.r-3),6.5,3.5,a,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle='rgba(255,255,255,0.14)';
  cx.beginPath();cx.arc(ex-e.r*0.3,ey-e.r*0.32,e.r*0.52,0,Math.PI*2);cx.fill();
  // Nucleus
  cx.fillStyle='#ffdd80';cx.strokeStyle='#c8a040';cx.lineWidth=1.5;
  cx.beginPath();cx.arc(ex+4,ey-5,e.r*0.34,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='#aa6010';
  cx.beginPath();cx.arc(ex+4,ey-5,e.r*0.15,0,Math.PI*2);cx.fill();
  // ARMOR text
  cx.fillStyle='rgba(212,192,64,0.95)';cx.font='bold 8px JetBrains Mono,monospace';cx.textAlign='center';
  cx.fillText('ARMORED',ex,ey+e.r+18);
}

function drawFungus(e){
  const ex=e.x+Math.sin(e.wb)*1.5,ey=e.y;
  cx.fillStyle='#4a7020';cx.strokeStyle='#253810';cx.lineWidth=2;
  cx.beginPath();cx.ellipse(ex,ey+e.r*0.45,e.r*0.32,e.r*0.62,0,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle=e.clr;cx.strokeStyle=e.rim;cx.lineWidth=2.5;
  cx.beginPath();cx.ellipse(ex,ey-e.r*0.18,e.r*1.25,e.r*0.88,0,Math.PI,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='rgba(255,255,255,0.45)';
  for(let i=0;i<4;i++){const a=Math.PI+i*(Math.PI/4);cx.beginPath();cx.arc(ex+Math.cos(a)*e.r*0.58,ey+Math.sin(a)*e.r*0.38,3.5,0,Math.PI*2);cx.fill();}
  cx.fillStyle='#1a2c00';
  cx.beginPath();cx.arc(ex-5,ey+2,3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+5,ey+2,3,0,Math.PI*2);cx.fill();
  if(e.frozen){cx.globalAlpha=0.45;cx.fillStyle='#88ddff';cx.beginPath();cx.arc(ex,ey,e.r+4,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
}
function drawLeech(e){
  const dx=TOWER_X-e.x,dy=TOWER_Y-e.y,d=Math.hypot(dx,dy)||1,nx=dx/d,ny=dy/d;
  for(let s=3;s>=0;s--){
    const ox=e.x-nx*s*7,oy=e.y-ny*s*7,sr=e.r*(s===0?1:0.76-s*0.07);
    cx.fillStyle=s===0?e.clr:darken(e.clr,0.15*s);cx.strokeStyle=e.rim;cx.lineWidth=1.5;
    cx.beginPath();cx.arc(ox,oy,sr,0,Math.PI*2);cx.fill();cx.stroke();
    cx.strokeStyle='rgba(100,0,120,0.35)';cx.lineWidth=1;
    cx.beginPath();cx.arc(ox,oy,sr*0.68,0,Math.PI*2);cx.stroke();
  }
  cx.fillStyle='#dd00dd';cx.strokeStyle='#660066';cx.lineWidth=1.5;
  cx.beginPath();cx.arc(e.x,e.y,e.r*0.48,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='#1a001a';cx.beginPath();cx.arc(e.x,e.y,e.r*0.24,0,Math.PI*2);cx.fill();
  if(e.frozen){cx.globalAlpha=0.45;cx.fillStyle='#88ddff';cx.beginPath();cx.arc(e.x,e.y,e.r+4,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
}
function drawLarvae(e){
  const ex=e.x+Math.sin(e.wb*2)*2.5,ey=e.y+Math.cos(e.wb)*1.5;
  cx.fillStyle=e.clr;cx.strokeStyle=e.rim;cx.lineWidth=1.5;
  cx.beginPath();cx.ellipse(ex,ey,e.r*1.3,e.r,Math.sin(e.wb)*0.3,0,Math.PI*2);cx.fill();cx.stroke();
  cx.strokeStyle=darken(e.clr,0.25);cx.lineWidth=1;
  for(let i=1;i<4;i++){cx.beginPath();cx.ellipse(ex+(i-2)*e.r*0.6,ey,e.r*0.38,e.r*0.8,0,0,Math.PI*2);cx.stroke();}
  cx.fillStyle=darken(e.clr,0.2);cx.strokeStyle=e.rim;cx.lineWidth=1.5;
  cx.beginPath();cx.arc(ex+e.r,ey,e.r*0.68,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='#000';
  cx.beginPath();cx.arc(ex+e.r*1.2,ey-2,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+e.r*1.2,ey+2,2,0,Math.PI*2);cx.fill();
}
function drawBlob(e){
  const wb=e.wb,ex=e.x+Math.sin(wb*0.7)*2,ey=e.y+Math.cos(wb*0.5)*1.5,wob=Math.sin(wb)*0.12;
  cx.fillStyle=e.clr;cx.strokeStyle=e.rim;cx.lineWidth=e.split?1.5:3;
  cx.beginPath();cx.ellipse(ex,ey,e.r*(1+wob),e.r*(1-wob*0.8),wb*0.2,0,Math.PI*2);cx.fill();cx.stroke();
  if(!e.split){
    cx.fillStyle=darken(e.clr,0.12);
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+wb*0.3;cx.beginPath();cx.arc(ex+Math.cos(a)*e.r*0.82,ey+Math.sin(a)*e.r*0.82,e.r*0.28,0,Math.PI*2);cx.fill();}
  }
  cx.fillStyle='rgba(255,255,200,0.32)';cx.beginPath();cx.arc(ex-e.r*0.2,ey-e.r*0.2,e.r*0.36,0,Math.PI*2);cx.fill();
  const es=e.split?2:4;
  cx.fillStyle='#003800';
  cx.beginPath();cx.arc(ex-e.r*0.28,ey-4,es,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+e.r*0.28,ey-4,es,0,Math.PI*2);cx.fill();
  if(e.acid){cx.globalAlpha=0.3+Math.sin(Date.now()*0.01)*0.15;cx.fillStyle='#88ff00';cx.beginPath();cx.arc(ex,ey,e.r+6,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
}
function drawBoss(e){
  const wb=e.wb*0.4,ex=e.x+Math.sin(wb)*3,ey=e.y+Math.cos(wb*0.7)*2;
  cx.globalAlpha=0.22+Math.sin(Date.now()*0.004)*0.1;
  cx.fillStyle=e.clr;cx.beginPath();cx.arc(ex,ey,e.r+18,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;
  cx.fillStyle=e.clr;cx.strokeStyle=e.rim;cx.lineWidth=4;
  cx.beginPath();cx.arc(ex,ey,e.r,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='#FFD700';cx.strokeStyle='#aa8800';cx.lineWidth=2;
  for(let i=0;i<7;i++){
    const a=(i/7)*Math.PI*2+wb,ix=ex+Math.cos(a)*e.r,iy=ey+Math.sin(a)*e.r;
    const ox=ex+Math.cos(a)*(e.r+22),oy=ey+Math.sin(a)*(e.r+22);
    cx.beginPath();cx.moveTo(ix,iy);cx.lineTo(ox,oy);cx.stroke();
    cx.beginPath();cx.arc(ox,oy,4,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle='#ffff00';
  cx.beginPath();cx.arc(ex-14,ey-8,9,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+14,ey-8,9,0,Math.PI*2);cx.fill();
  cx.fillStyle='#000';
  cx.beginPath();cx.arc(ex-13,ey-9,5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+15,ey-9,5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ff0000';
  cx.beginPath();cx.arc(ex-12,ey-10,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+16,ey-10,2,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#ff4400';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(ex-22,ey-18);cx.lineTo(ex-6,ey-14);cx.stroke();
  cx.beginPath();cx.moveTo(ex+22,ey-18);cx.lineTo(ex+6,ey-14);cx.stroke();
  cx.fillStyle='#220000';cx.beginPath();cx.ellipse(ex,ey+12,18,10,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ff0000';
  for(let i=-1;i<=1;i++){cx.beginPath();cx.arc(ex+i*10,ey+12,3,0,Math.PI*2);cx.fill();}
  cx.fillStyle='rgba(255,50,0,0.95)';cx.font='bold 11px Orbitron,Arial';cx.textAlign='center';
  cx.fillText('💀 BOSS',ex,ey+e.r+20);
  if(e.frozen){cx.globalAlpha=0.4;cx.fillStyle='#88ddff';cx.beginPath();cx.arc(ex,ey,e.r+8,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
}

function drawEnemy(e){
  cx.fillStyle='rgba(0,0,0,0.22)';
  cx.beginPath();cx.ellipse(e.x,e.y+e.r,e.r*0.88,e.r*0.25,0,0,Math.PI*2);cx.fill();
  if(e.t==='virus')        drawVirus(e);
  else if(e.t==='worm')    drawWorm(e);
  else if(e.t==='bacteria')drawBacteria(e);
  else if(e.t==='fungus')  drawFungus(e);
  else if(e.t==='leech')   drawLeech(e);
  else if(e.t==='larvae')  drawLarvae(e);
  else if(e.t==='blob')    drawBlob(e);
  else if(e.t==='boss')    drawBoss(e);
  if(e.hp<e.maxHp){
    const bw=e.r*2.8,bh=5;
    const bx=e.x-bw/2,by=e.y-e.r-13;
    cx.fillStyle='#220000';cx.fillRect(bx,by,bw,bh);
    const ratio=e.hp/e.maxHp;
    cx.fillStyle=ratio>0.5?C.neonRed:'#ff5500';
    cx.fillRect(bx,by,bw*ratio,bh);
    cx.strokeStyle='#440000';cx.lineWidth=0.8;cx.strokeRect(bx,by,bw,bh);
  }
}

// ── DRAW: PROJECTILES ─────────────────────────────────────────────────────────
function drawProj(p){
  cx.globalAlpha=0.3;
  cx.strokeStyle=p.clr;cx.lineWidth=p.r*2.2;cx.lineCap='round';
  cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(p.x-p.vx*0.055,p.y-p.vy*0.055);cx.stroke();
  cx.globalAlpha=1;
  cx.fillStyle=p.clr;cx.strokeStyle='rgba(255,220,100,0.6)';cx.lineWidth=1.5;
  cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();cx.stroke();
  if(p.key==='chunk'){
    cx.fillStyle='rgba(110,55,10,0.45)';
    cx.beginPath();cx.arc(p.x+p.r*0.3,p.y-p.r*0.3,p.r*0.52,0,Math.PI*2);cx.fill();
  }
}

// ── DRAW: FX ──────────────────────────────────────────────────────────────────
function drawPart(p){
  if(p.ring){
    cx.strokeStyle=p.clr;cx.lineWidth=3;cx.globalAlpha=p.life;
    cx.beginPath();cx.arc(p.x,p.y,p.r*(1-p.life*0.5),0,Math.PI*2);cx.stroke();
    cx.globalAlpha=1;
  }else{
    cx.fillStyle=p.clr;cx.globalAlpha=p.life;
    cx.beginPath();cx.arc(p.x,p.y,p.r*Math.max(0.05,p.life),0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }
}

function drawFloater(f){
  cx.globalAlpha=f.life;
  cx.font='bold 14px Orbitron,Arial';cx.textAlign='center';
  cx.strokeStyle='rgba(0,0,0,0.7)';cx.lineWidth=3;
  cx.strokeText(f.text,f.x,f.y);
  cx.fillStyle=f.clr;cx.fillText(f.text,f.x,f.y);
  cx.globalAlpha=1;
}

function drawPanel(p){
  cx.save();
  cx.translate(p.x,p.y);cx.rotate(p.rot);cx.scale(p.sc,p.sc);
  cx.globalAlpha=Math.min(1,p.life*1.6);
  // Starburst
  const nPts=8,oR=62,iR=42;
  cx.fillStyle='#ffd700';
  cx.beginPath();
  for(let i=0;i<nPts*2;i++){
    const a=(i/(nPts*2))*Math.PI*2-Math.PI/2;
    const r=i%2===0?oR:iR;
    i===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  cx.closePath();cx.fill();
  cx.strokeStyle='#8B3000';cx.lineWidth=3.5;cx.stroke();
  // Text
  cx.fillStyle='#1a0800';
  cx.font='bold 14px Orbitron,"Arial Black",Arial';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(p.text,0,0);
  cx.restore();
}

// ── DRAW: TOWERS ──────────────────────────────────────────────────────────────
function drawTowers(){
  for(let si=0;si<ALTAR_SLOTS.length;si++){
    const s=ALTAR_SLOTS[si];
    const t=towers.find(t=>t.slot===si);
    if(t){
      const tt=TT[t.type],lv=t.level||0;

// ── AMBIENT ───────────────────────────────────────────────────────────────────
let _drone=null;
function startDrone(){
  if(_drone)return;
  const a=getAC(),o=a.createOscillator(),g=a.createGain(),lfo=a.createOscillator(),lfog=a.createGain();
  o.type='sine';o.frequency.value=55;
  lfo.type='sine';lfo.frequency.value=0.12;lfog.gain.value=4;
  lfo.connect(lfog);lfog.connect(o.frequency);
  g.gain.value=0.04;o.connect(g);g.connect(a.destination);
  o.start();lfo.start();_drone={o,g,lfo};
}
function stopDrone(){
  if(!_drone)return;
  try{_drone.g.gain.exponentialRampToValueAtTime(0.0001,getAC().currentTime+0.8);
  _drone.o.stop(getAC().currentTime+0.9);_drone.lfo.stop(getAC().currentTime+0.9);}catch{}
  _drone=null;
}

  });

  cx.fillStyle='#332211';cx.font='10px JetBrains Mono';cx.textAlign='center';
  cx.fillText('← tap outside to go back',W/2,H-20,W-40);
}

// ── MENU ──────────────────────────────────────────────────────────────────────
function drawMenu(){
  drawBg();
  drawCannon();

  // Dark panel over lower field
  rRect(16,WATER_Y+20,W-32,340,18,'rgba(8,3,0,0.94)','#553300',2);

  // Title
  cx.fillStyle=C.neonGold;
  cx.font='bold 62px Orbitron,Arial';
  cx.textAlign='center';
  cx.shadowColor='#aa3300';cx.shadowBlur=28;
  cx.strokeStyle='rgba(30,0,0,0.9)';cx.lineWidth=5;
  cx.strokeText('POOPATHON',W/2,WATER_Y+120,W-20);
  cx.fillText('POOPATHON',W/2,WATER_Y+120,W-20);
  cx.shadowBlur=0;

  cx.fillStyle=C.textMuted;cx.font='bold 11px Orbitron,Arial';cx.lineWidth=0;
  cx.fillText('TOWER DEFENSE',W/2,WATER_Y+150);

  cx.strokeStyle='#553300';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(80,WATER_Y+168);cx.lineTo(W-80,WATER_Y+168);cx.stroke();

  cx.fillStyle='#886644';cx.font='13px JetBrains Mono';
  cx.fillText('Aim · Fire · FLUSH',W/2,WATER_Y+195);
  const _mm=loadMeta();
  if(_mm.hs){cx.fillStyle='#443322';cx.font='10px JetBrains Mono';
    cx.fillText(`Best: Wave ${(_mm.bw||0)+1} · ${_mm.hs} slime  (run #${_mm.runs||1})`,W/2,WATER_Y+215,W-50);}

  // Start button
  const sy=WATER_Y+226;
  cx.shadowColor='#cc2200';cx.shadowBlur=20;
  rRect(W/2-120,sy,240,64,14,'#8B0000','#ff3300',3);
  cx.shadowBlur=0;
  cx.fillStyle=C.neonGold;cx.font='bold 26px Orbitron,Arial';cx.textAlign='center';
  cx.fillText('▶  START',W/2,sy+43);

  cx.fillStyle='#2a1200';cx.font='10px JetBrains Mono';
  cx.fillText('v0.4 · Open Source on GitHub',W/2,H-18);
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;

  if(gs==='boss_warn'){
    bossWarnTimer-=dt;
    if(bossWarnTimer<=0){gs='playing';startWave(waveIdx+1);}
    return;
  }
  if(gs==='chapter_clear'){
    chapterClearTimer-=dt;return;
  }
  if(gs==='wave_clear'){
    waterOffset=(waterOffset+dt*18)%(Math.PI*2);
    updateVFX(dt);
    // Pressure decays after 2s grace
    if(clearTimer<4)pressure=Math.max(0,pressure-4*dt);
    clearTimer-=dt;
    for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=p.dec*dt;}
    parts=parts.filter(p=>p.life>0);
    for(const f of floaters){f.y+=f.vy*dt;f.vy*=0.88;f.life-=f.dec*dt;}
    floaters=floaters.filter(f=>f.life>0);
    for(const p of panels){p.sc=lerp(p.sc,1.0,0.22);p.life-=p.dec*dt;}
    panels=panels.filter(p=>p.life>0);
    if(clearTimer<=0){
      const nextIdx=waveIdx+1;
      if([2,5,8,11,14,17].includes(waveIdx)){
        const m=loadMeta();
        const reqs=[3,6,9,12,15];
        const wasUnlocked=reqs.map(r=>(m.bw||0)>=r);
        m.bw=Math.max(m.bw||0,nextIdx);saveMeta(m);
        reqs.forEach((req,i)=>{if(!wasUnlocked[i]&&m.bw>=req)toast(`${CHAPS[i+1].name} UNLOCKED!`,'#ffdd55');});
        chapterClearTimer=5;gs='chapter_clear';stopDrone();
      } else if(nextIdx<WD.length&&WD[nextIdx].some(g=>g.t==='boss')){
        bossWarnTimer=2.5;gs='boss_warn';
      } else {
        gs='playing';startWave(nextIdx);
      }
    }
  }else{
    update(dt);
  }

  let ox=0,oy=0;
  if(shakeT>0){ox=(Math.random()-0.5)*shakeI*2;oy=(Math.random()-0.5)*shakeI*2;cx.save();cx.translate(ox,oy);}

  if(gs==='menu'){
    drawMenu();
  }else if(gs==='chapter_select'){
    drawChapterSelect();
  }else{
    drawBg();
    drawTowers();
    for(const p of parts)   drawPart(p);
    for(const p of projs)   drawProj(p);
    for(const e of enemies) drawEnemy(e);
    drawVFX();
    drawCannon();
    drawVignette();
    drawUltFlash();
    if(gs!=='game_over') drawHUD();
    for(const f of floaters) drawFloater(f);
    for(const p of panels)   drawPanel(p);
    if(gs==='wave_clear')    drawWaveClear();
    if(gs==='boss_warn')     drawBossWarn();
    if(gs==='chapter_clear') drawChapterClear();
    if(gs==='game_over')     drawGameOver();
    drawToasts();
  }

  if(shakeT>0)cx.restore();
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function toG(cx2,cy2){const r=cv.getBoundingClientRect();return{x:(cx2-r.left)/SC,y:(cy2-r.top)/SC};}
function onDown(cx2,cy2){
  getAC(); // resume AudioContext on first user gesture
  const p=toG(cx2,cy2);
  if(gs==='menu'){
    const sy=WATER_Y+226;
    if(p.x>=W/2-120&&p.x<=W/2+120&&p.y>=sy&&p.y<=sy+64){gs='chapter_select';}
    return;
  }
  if(gs==='chapter_select'){
    const meta=loadMeta(),unlocked=[true,...[3,6,9,12,15].map(r=>(meta.bw||0)>=r)];
    const cW=(W-54)/2,cH2=86,cX=[18,W/2+3],cY0=WATER_Y+74;
    for(let i=0;i<CHAPS.length;i++){
      if(!unlocked[i])continue;
      const col=i%2,row=Math.floor(i/2);
      const cx0=cX[col],cy=cY0+row*(cH2+8);
      if(p.x>=cx0&&p.x<=cx0+cW&&p.y>=cy&&p.y<=cy+cH2){startGame(CHAPS[i].sw);return;}
    }
    gs='menu'; return;
  }
  if(gs==='game_over'){
    const ry=H/2+78;
    if(p.x>=W/2-110&&p.x<=W/2+110&&p.y>=ry&&p.y<=ry+60)startGame();
    return;
  }
  if(gs==='chapter_clear'){
    if(p.x>=W/2-110&&p.x<=W/2+110&&p.y>=H/2+80&&p.y<=H/2+134){gs='chapter_select';}
    return;
  }
  if(gs==='boss_warn')return;
  if(gs==='wave_clear'){
    // Shop
    if(shopOffers.length){
      const sw=82,sh=42,sy=H/2+122,sx0=(W-shopOffers.length*(sw+6))/2;
      for(let i=0;i<shopOffers.length;i++){
        const u=shopOffers[i],bx=sx0+i*(sw+6);
        if(p.x>=bx&&p.x<=bx+sw&&p.y>=sy&&p.y<=sy+sh&&gold>=u.cost){
          gold-=u.cost;applyUpgrade(u.id);
          shopOffers.splice(i,1);
          snd_wave_clear();return;
        }
      }
    }
    for(let si=0;si<ALTAR_SLOTS.length;si++){
      const s=ALTAR_SLOTS[si];
      if(dist(p.x,p.y,s.x,s.y)<36){
        const idx=towers.findIndex(t=>t.slot===si);
        if(idx>=0){
          const tw=towers[idx],tt=TT[tw.type],lv=tw.level||0;
          if(lv<2&&gold>=tt.cost[lv+1]){gold-=tt.cost[lv+1];tw.level=(lv+1);tw.cd=0;}
          else{
            const spent=tt.cost.slice(0,lv+1).reduce((a,b)=>a+b,0);
            gold+=Math.floor(spent*0.5);towers.splice(idx,1);
          }
        } else if(gold>=TT[0].cost[0]){
          gold-=TT[0].cost[0]; towers.push({slot:si,type:0,level:0,cd:0});
        }
        return;
      }
    }
    return;
  }
  const btnW=94,btnH=54,btnsY=H-btnH-9;
  const tot=Modes.length*btnW+(Modes.length-1)*7,btnsX=(W-tot)/2;
  for(let i=0;i<Modes.length;i++){
    const bx=btnsX+i*(btnW+7);
    if(p.x>=bx&&p.x<=bx+btnW&&p.y>=btnsY&&p.y<=btnsY+btnH){modeIdx=i;return;}
  }
  if(pressure>=MAX_P&&!ultActive){
    const ultBtns=[{x:TOWER_X-58,y:PIVOT_Y+85},{x:TOWER_X,y:PIVOT_Y+75},{x:TOWER_X+58,y:PIVOT_Y+85}];
    for(let i=0;i<3;i++){if(dist(p.x,p.y,ultBtns[i].x,ultBtns[i].y)<26){ultIdx=i;triggerUlt();return;}}
    if(dist(p.x,p.y,TOWER_X,TOWER_Y)<110){triggerUlt();return;}
  }
  if(gs==='playing'){
    touchDownT=Date.now(); touchDownY=p.y; gestureSwiped=false;
    modeIdx=1; // default hold = Auto Diarrhea
    aimActive=true; aimAngle=Math.atan2(p.y-PIVOT_Y,p.x-TOWER_X);
  }
}
function onMove(cx2,cy2){
  if(!aimActive||gs!=='playing')return;
  const p=toG(cx2,cy2);
  aimAngle=Math.atan2(p.y-PIVOT_Y,p.x-TOWER_X);
  if(!gestureSwiped&&p.y<touchDownY-30){
    gestureSwiped=true; modeIdx=2; // swipe up = Gas Cone
  }
}
function onUp(){
  if(aimActive&&gs==='playing'&&!gestureSwiped&&Date.now()-touchDownT<150)
    modeIdx=0; // tap = Chunk Burst
  aimActive=false;
}
cv.addEventListener('mousedown', e=>onDown(e.clientX,e.clientY));
cv.addEventListener('mousemove', e=>onMove(e.clientX,e.clientY));
cv.addEventListener('mouseup',   onUp);
cv.addEventListener('touchstart',e=>{e.preventDefault();onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchmove', e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchend',  e=>{e.preventDefault();onUp();},{passive:false});

// ── INIT ──────────────────────────────────────────────────────────────────────
function startGame(startWv=0){
  currentChapter=CHAPS.findIndex(c=>c.sw===startWv); if(currentChapter<0)currentChapter=0;
  enemies=[];projs=[];parts=[];floaters=[];panels=[];rings=[];dmgNums=[];screenFlash=0;
  pressure=0;gold=0;score=0;
  modeIdx=0;fireCd=0;
  aimAngle=Math.PI/2;aimActive=false;
  pressureFullTimer=0;touchDownT=0;gestureSwiped=false;
  towers=[];ultIdx=0;lastUlt=0;lives=3;
  shopOffers=[];dmgMult=1;rateMult=1;splashMult=1;
  combo=0;comboTimer=0;comboMult=1;
  bossWarnTimer=0;chapterClearTimer=0;toasts=[];
  swarming=false;swarmTimer=0;goldRushTimer=0;stopDrone();
  shakeT=0;shakeI=0;vigA=0;
  ultActive=false;ultTimer=0;
  gs='playing';startWave(startWv);startDrone();
}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
