<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POOPATHON</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0400;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
    }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 390, H = 844;
let scale = 1;
function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── LAYOUT CONSTANTS (GDD §10.1) ──────────────────────────────────────────────
const HUD_H      = 82;          // top HUD height
const FIELD_TOP  = HUD_H;
const FIELD_BOT  = Math.round(H * 0.78);  // 78%
const TOWER_X    = W / 2;
const TOWER_Y    = FIELD_BOT - 80;
const PIVOT_Y    = TOWER_Y - 24;
const BARREL_LEN = 44;
const PBAR_X     = 8;           // vertical pressure bar x
const PBAR_W     = 18;
const PBAR_TOP   = FIELD_TOP + 8;
const PBAR_BOT   = FIELD_BOT - 8;
const MAX_P      = 100;

// ── FIRE MODES — GDD §3.2 ─────────────────────────────────────────────────────
const Modes = [
  { name:'CHUNK BURST', key:'chunk', em:'💩',
    dmg:28, rate:0.85, spd:260, splash:0,  pr:9, clr:'#7B4020',
    pKill:8,  desc:'Heavy ballistic · Armor pierce · Stagger' },
  { name:'AUTO DIARRHEA', key:'auto', em:'💦',
    dmg:7,  rate:4.2,  spd:540, splash:0,  pr:4, clr:'#C8A028',
    pKill:3,  desc:'Rapid stream · Low damage per hit' },
  { name:'GAS CONE', key:'gas',   em:'💨',
    dmg:20, rate:0.42, spd:270, splash:98, pr:9, clr:'#3a9B00',
    pKill:12, desc:'AOE gas blast · Area damage' },
];

// ── ENEMIES — GDD §6.2 ────────────────────────────────────────────────────────
const EDefs = {
  virus: {
    maxHp:13, speed:152, r:9,
    clr:'#8BCC00', rim:'#4a7700',
    reward:3, pDmg:7, pKill:3,
    armor:0, type:'virus'
  },
  worm: {
    maxHp:38, speed:58, r:13,
    clr:'#7B3010', rim:'#3d1800',
    reward:5, pDmg:10, pKill:5,
    armor:0, type:'worm'
  },
  bacteria: {
    maxHp:150, speed:26, r:24,
    clr:'#C8A050', rim:'#886830',
    reward:25, pDmg:20, pKill:10,
    armor:0.45, type:'bacteria'
  },
};

// ── WAVE DEFS ─────────────────────────────────────────────────────────────────
const WaveDefs = [
  [{ t:'virus',  n:8,  iv:1.0 }],
  [{ t:'virus',  n:6,  iv:0.9 }, { t:'worm',    n:4,  iv:1.4 }],
  [{ t:'virus',  n:10, iv:0.7 }, { t:'worm',    n:5,  iv:1.2 }, { t:'bacteria', n:1, iv:4.0 }],
  [{ t:'virus',  n:12, iv:0.6 }, { t:'worm',    n:7,  iv:1.0 }, { t:'bacteria', n:2, iv:3.5 }],
  [{ t:'bacteria',n:4, iv:2.8 }, { t:'worm',    n:10, iv:0.8 }, { t:'virus',    n:18,iv:0.45 }],
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let gstate = 'menu';
let enemies, projs, parts, floaters, impactPanels;
let pressure, gold, score, waveIdx;
let modeIdx, fireCd;
let aimAngle, aimActive;
let shakeT, shakeI;
let queues;
let clearTimer;
let vignetteA = 0;
let ultActive = false, ultTimer = 0;
let lastTs = 0;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const rnd   = (a, b)    => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist  = (ax,ay,bx,by) => Math.hypot(bx-ax,by-ay);
const lerp  = (a, b, t) => a + (b-a)*t;

function darken(hex, f) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.round(r*(1-f))); g=Math.max(0,Math.round(g*(1-f))); b=Math.max(0,Math.round(b*(1-f)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function rRect(x,y,w,h,r,fill,stroke,lw=2) {
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if (fill)   { ctx.fillStyle=fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function burst(x,y,clr,n,spd,sz) {
  for (let i=0;i<n;i++) {
    const a=rnd(0,Math.PI*2), s=rnd(spd*0.4,spd);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(sz*0.5,sz),clr,life:1,dec:rnd(1.8,3.2)});
  }
}
function splatSplash(x,y,splR) {
  burst(x,y,'#7B4020',16,200,7);
  burst(x,y,'#C8A028', 8,120,4);
  parts.push({x,y,vx:0,vy:0,r:splR,clr:'rgba(150,60,0,0.38)',life:1,dec:5.5,ring:true});
}
function gasSplash(x,y,splR) {
  burst(x,y,'#3a9B00',14,180,7);
  burst(x,y,'#88dd00', 8,110,4);
  parts.push({x,y,vx:0,vy:0,r:splR,clr:'rgba(50,140,0,0.35)',life:1,dec:4.5,ring:true});
}
function shake(intensity,dur) {
  shakeI=Math.max(shakeI,intensity); shakeT=Math.max(shakeT,dur);
}

// ── FLOATERS ──────────────────────────────────────────────────────────────────
function floater(x,y,text,clr) {
  floaters.push({x,y:y-16,text,clr,life:1,dec:1.6,vy:-55});
}

// ── IMPACT PANELS (KA-SPLAT!) ────────────────────────────────────────────────
const IMPACT_TEXTS = {
  chunk:    ['KA-SPLAT!','BLORP!','THWUMP!'],
  auto:     ['RAT-A-TAT!','SPLAT!','PITTER-PAT!'],
  gas:      ['РЫГНУЛО!','BWAAAP!','TOXIC!'],
  throne:   ['THRONE HIT!','ДЕРЬМО!'],
  ultimate: ['FLUSH!','СБРОС!','PURGE!'],
};
function impactPanel(x,y,modeKey) {
  if (Math.random() > 0.55) return; // 55% chance per kill
  const pool = IMPACT_TEXTS[modeKey] || IMPACT_TEXTS.chunk;
  const text = pool[Math.floor(Math.random()*pool.length)];
  impactPanels.push({x,y,text,life:1,dec:1.4,sc:0.4,tSc:1.0,rot:rnd(-0.25,0.25)});
}

// ── WAVE MANAGEMENT ───────────────────────────────────────────────────────────
function startWave(idx) {
  waveIdx = idx; clearTimer = 0;
  const def  = WaveDefs[Math.min(idx, WaveDefs.length-1)];
  const bonus = idx >= WaveDefs.length ? 1 + (idx-WaveDefs.length+1)*0.4 : 1;
  queues = def.map(g=>({
    t:g.t, rem:Math.round(g.n*bonus),
    iv:g.iv/Math.max(1,bonus*0.75), timer:0,
  }));
}

// ── SHOOTING ──────────────────────────────────────────────────────────────────
function shoot(tx,ty) {
  const m=Modes[modeIdx];
  const dx=tx-TOWER_X, dy=ty-PIVOT_Y;
  const d=Math.hypot(dx,dy)||1, a=Math.atan2(dy,dx);
  projs.push({
    x:TOWER_X+Math.cos(a)*BARREL_LEN, y:PIVOT_Y+Math.sin(a)*BARREL_LEN,
    vx:(dx/d)*m.spd, vy:(dy/d)*m.spd,
    dmg:m.dmg, splash:m.splash, r:m.pr,
    clr:m.clr, mode:m.key, alive:true,
  });
}

function bestTarget() {
  if (!enemies.length) return null;
  if (aimActive) {
    const adx=Math.cos(aimAngle), ady=Math.sin(aimAngle);
    let best=null, bestS=-Infinity;
    for (const e of enemies) {
      const dx=e.x-TOWER_X, dy=e.y-PIVOT_Y, d=Math.hypot(dx,dy)||1;
      const s=(dx/d)*adx+(dy/d)*ady;
      if (s>bestS){ bestS=s; best=e; }
    }
    return best;
  }
  let nearest=null, nd=Infinity;
  for (const e of enemies) {
    const d=dist(TOWER_X,PIVOT_Y,e.x,e.y);
    if (d<nd){ nd=d; nearest=e; }
  }
  return nearest;
}

// ── ULTIMATE — Auto Flush ─────────────────────────────────────────────────────
function triggerUltimate() {
  if (ultActive) return;
  ultActive=true; ultTimer=1.5;
  shake(22,0.7);
  let killed=0;
  for (const e of enemies) {
    gold+=e.reward; score+=e.reward; killed++;
    burst(e.x,e.y,e.clr,14,200,8);
    burst(e.x,e.y,'#00ccff',8,160,5);
    impactPanels.push({x:e.x,y:e.y,text:'FLUSH!',life:1,dec:1.2,sc:0.3,tSc:1.1,rot:rnd(-0.2,0.2)});
  }
  enemies=[];
  pressure=0;
  if (killed>0) floater(W/2, H/2-100, `PRESSURE RELEASE! +${killed*8} SLIME`, '#00ffcc');
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (gstate!=='playing') return;

  fireCd=Math.max(0,fireCd-dt);
  if (shakeT>0){ shakeT-=dt; if(shakeT<=0)shakeI=0; }
  if (vignetteA>0) vignetteA=Math.max(0,vignetteA-dt*3);
  if (ultActive){ ultTimer-=dt; if(ultTimer<=0)ultActive=false; }

  // Pressure auto-trigger at 100
  if (pressure>=MAX_P && !ultActive) {
    setTimeout(()=>{ if(pressure>=MAX_P) triggerUltimate(); }, 0);
    return;
  }

  // Spawn
  for (const q of queues) {
    if (q.rem<=0) continue;
    q.timer+=dt;
    while (q.timer>=q.iv && q.rem>0) {
      q.timer-=q.iv; q.rem--;
      const d=EDefs[q.t];
      enemies.push({
        t:q.t, x:rnd(40,W-40), y:rnd(-35,-5),
        hp:d.maxHp, maxHp:d.maxHp,
        spd:d.speed*rnd(0.88,1.12),
        r:d.r, clr:d.clr, rim:d.rim,
        reward:d.reward, pDmg:d.pDmg, pKill:d.pKill,
        armor:d.armor||0,
        wb:rnd(0,Math.PI*2), wbs:rnd(2,4), dead:false,
      });
    }
  }

  // Update enemies
  for (const e of enemies) {
    if (e.dead) continue;
    e.wb+=e.wbs*dt;
    const dx=TOWER_X-e.x, dy=TOWER_Y-e.y, d=Math.hypot(dx,dy)||1;
    e.x+=(dx/d)*e.spd*dt; e.y+=(dy/d)*e.spd*dt;
    if (d<e.r+30) {
      pressure=clamp(pressure+e.pDmg,0,MAX_P);
      burst(e.x,e.y,e.clr,8,160,8);
      burst(TOWER_X,TOWER_Y,'#ff4400',5,200,6);
      shake(e.t==='bacteria'?14:7,0.35);
      vignetteA=0.65;
      impactPanels.push({x:TOWER_X+rnd(-40,40),y:TOWER_Y-60,
        text:IMPACT_TEXTS.throne[Math.floor(Math.random()*IMPACT_TEXTS.throne.length)],
        life:1,dec:1.2,sc:0.3,tSc:1.0,rot:rnd(-0.2,0.2)});
      floater(TOWER_X,TOWER_Y-80,`+${e.pDmg}💀`,'#ff3300');
      e.dead=true;
      if (pressure>=MAX_P) { gstate='game_over'; return; }
    }
  }
  enemies=enemies.filter(e=>!e.dead);

  // Auto-fire toward target
  const tgt=bestTarget();
  if (tgt) {
    const ta=Math.atan2(tgt.y-PIVOT_Y,tgt.x-TOWER_X);
    aimAngle=lerp(aimAngle,ta,0.18);
    if (fireCd<=0) {
      fireCd=1/Modes[modeIdx].rate;
      shoot(tgt.x,tgt.y);
    }
  }

  // Update projectiles
  for (const p of projs) {
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if (p.x<-80||p.x>W+80||p.y<-150||p.y>H+80){ p.alive=false; continue; }
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist(p.x,p.y,e.x,e.y)<p.r+e.r) {
        const actualDmg = p.dmg * (1 - e.armor);
        e.hp-=actualDmg;
        burst(e.x,e.y,e.clr,5,130,5);
        if (p.splash>0) {
          if (p.mode==='gas') gasSplash(p.x,p.y,p.splash);
          else splatSplash(p.x,p.y,p.splash);
          shake(9,0.28);
          for (const e2 of enemies) {
            if (!e2.dead && e2!==e && dist(p.x,p.y,e2.x,e2.y)<p.splash)
              e2.hp-=p.dmg*(1-e2.armor)*0.6;
          }
        }
        p.alive=false;
        if (e.hp<=0) {
          e.dead=true;
          gold+=e.reward; score+=e.reward;
          const pGain=Modes[modeIdx].pKill;
          pressure=clamp(pressure+pGain,0,MAX_P);
          burst(e.x,e.y,e.clr,13,185,8);
          burst(e.x,e.y,'#ffd700',5,140,4);
          floater(e.x,e.y-8,`+${e.reward}💰`,'#ffd700');
          floater(e.x+20,e.y-22,`+${pGain}💩`,'#88cc00');
          impactPanel(e.x,e.y,p.mode);
        }
        break;
      }
    }
  }
  projs  =projs.filter(p=>p.alive);
  enemies=enemies.filter(e=>!e.dead);

  // Particles
  for (const p of parts) {
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.9; p.vy*=0.9; p.life-=p.dec*dt;
  }
  parts=parts.filter(p=>p.life>0);

  // Floaters
  for (const f of floaters) {
    f.y+=f.vy*dt; f.vy*=0.88; f.life-=f.dec*dt;
  }
  floaters=floaters.filter(f=>f.life>0);

  // Impact panels
  for (const p of impactPanels) {
    p.sc=lerp(p.sc,p.tSc,0.25); p.life-=p.dec*dt;
  }
  impactPanels=impactPanels.filter(p=>p.life>0);

  // Wave clear
  if (queues.every(q=>q.rem<=0) && enemies.length===0) {
    gstate='wave_clear'; clearTimer=3.0;
  }
}

// ── BACKGROUND — Sewer (GDD §8.2 Ch.1 palette) ───────────────────────────────
function drawBg() {
  ctx.fillStyle='#150a00';
  ctx.fillRect(0,0,W,H);

  // Sewer tile grid
  ctx.strokeStyle='#221200'; ctx.lineWidth=0.5;
  const gs=44;
  for (let x=0;x<=W;x+=gs){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for (let y=0;y<=H;y+=gs){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // Green sewer water puddles (GDD: "green sewer water accents")
  ctx.globalAlpha=0.07;
  ctx.fillStyle='#1a5a1a';
  const puddles=[{x:80,y:280,rx:55,ry:18},{x:300,y:420,rx:45,ry:15},{x:170,y:520,rx:60,ry:20}];
  for (const p of puddles) {
    ctx.beginPath(); ctx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Rusted pipe markings at spawn zone (top)
  ctx.strokeStyle='rgba(120,60,0,0.3)'; ctx.lineWidth=6; ctx.lineCap='round';
  const pipeX=[50,120,200,270,340];
  for (const px of pipeX) {
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,24); ctx.stroke();
    ctx.fillStyle='rgba(120,60,0,0.25)';
    ctx.beginPath(); ctx.arc(px,8,8,0,Math.PI*2); ctx.fill();
  }

  // Grime drips on walls
  ctx.strokeStyle='rgba(40,20,0,0.4)'; ctx.lineWidth=2;
  for (let i=0;i<6;i++) {
    const dx=i*60+20, dy=FIELD_TOP+30+i*20;
    ctx.beginPath(); ctx.moveTo(dx,FIELD_TOP); ctx.lineTo(dx+rnd(-5,5)*0,dy); ctx.stroke();
  }

  // Warm glow toward throne
  const gr=ctx.createRadialGradient(TOWER_X,TOWER_Y,20,TOWER_X,TOWER_Y,300);
  gr.addColorStop(0,'rgba(80,45,0,0.12)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
}

// ── TOILET THRONE (GDD §3.1 "ceramic toilet-throne") ────────────────────────
function drawTower() {
  const tx=TOWER_X, ty=TOWER_Y;

  // Platform shadow
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(tx,ty+22,56,15,0,0,Math.PI*2); ctx.fill();

  // ── TOILET TANK (back) ──
  // Tank body
  rRect(tx-26,ty-78,52,52,5,'#e8dcc0','#9B8840',2.5);
  // Tank lid (slightly wider)
  rRect(tx-28,ty-86,56,14,4,'#d8cca8','#9B8840',2);
  // Flush button / chain
  ctx.fillStyle='#c8a414';
  ctx.beginPath(); ctx.arc(tx+14,ty-56,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#c8a414'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx+14,ty-51); ctx.lineTo(tx+14,ty-32); ctx.stroke();
  // Brand text on tank
  ctx.fillStyle='rgba(140,100,40,0.4)';
  ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.fillText('POOPATHON', tx, ty-54);

  // ── TOILET BOWL ──
  // Outer bowl (porcelain)
  ctx.fillStyle='#e8dcc0'; ctx.strokeStyle='#9B8840'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(tx,ty+6,38,16,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Inner water (GDD Chapter 1: green sewer water)
  ctx.fillStyle='#2a6030';
  ctx.beginPath(); ctx.ellipse(tx,ty+6,25,10,0,0,Math.PI*2); ctx.fill();
  // Water glint
  ctx.fillStyle='rgba(100,200,120,0.2)';
  ctx.beginPath(); ctx.ellipse(tx-6,ty+3,10,4,Math.PI*0.15,0,Math.PI*2); ctx.fill();

  // ── TOILET SEAT ──
  ctx.strokeStyle='#b8a870'; ctx.lineWidth=4; ctx.fillStyle='rgba(0,0,0,0)';
  ctx.beginPath(); ctx.ellipse(tx,ty-4,36,14,0,0,Math.PI*2);
  ctx.stroke();

  // ── CANNON BARREL ──
  ctx.save();
  ctx.translate(TOWER_X,PIVOT_Y);
  ctx.rotate(aimAngle);
  // Base ring at pivot
  rRect(-4,-7,12,14,3,'#4a2400','#2a1200',1.5);
  // Barrel pipe
  rRect(6,-5,BARREL_LEN-6,10,3,'#3a1800','#1a0800',1.5);
  // Muzzle cap
  ctx.fillStyle='#5a2800'; ctx.strokeStyle='#8a4a00'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(BARREL_LEN,0,8,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Muzzle hole
  ctx.fillStyle='#0d0500';
  ctx.beginPath(); ctx.arc(BARREL_LEN,0,4,0,Math.PI*2); ctx.fill();
  // Fire flash
  const m=Modes[modeIdx];
  if (fireCd>0 && fireCd>(1/m.rate)*0.6) {
    ctx.globalAlpha=Math.min(1,fireCd*4);
    ctx.fillStyle=m.clr;
    ctx.beginPath(); ctx.arc(BARREL_LEN,0,15,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // ── PRESSURE CRACKS + GLOW ──
  if (pressure>60) {
    const a=(pressure-60)/40;
    // Red crack vines on tank
    ctx.strokeStyle=`rgba(200,0,0,${a*0.55})`; ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(tx-12,ty-78); ctx.lineTo(tx+4,ty-55);
    ctx.moveTo(tx+16,ty-74); ctx.lineTo(tx+8,ty-42);
    ctx.moveTo(tx-6,ty-62); ctx.lineTo(tx-18,ty-46);
    ctx.stroke();
    // Ambient pressure glow
    const gr=ctx.createRadialGradient(tx,ty-30,15,tx,ty-30,80+pressure*0.5);
    gr.addColorStop(0,`rgba(255,0,0,${a*0.22})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(tx-100,ty-120,200,150);
  }

  // ── ULTIMATE READY INDICATOR ──
  if (pressure>=MAX_P && !ultActive) {
    const pulse=(Math.sin(Date.now()*0.006)*0.5+0.5);
    ctx.strokeStyle=`rgba(0,255,200,${0.6+pulse*0.4})`;
    ctx.lineWidth=3+pulse*2;
    ctx.beginPath(); ctx.arc(tx,ty-30,55+pulse*8,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=`rgba(0,255,200,${0.8+pulse*0.2})`;
    ctx.font='bold 13px "Arial Black",Arial';
    ctx.textAlign='center';
    ctx.fillText('★ RELEASE PRESSURE ★',tx,ty-108);
  }
}

// ── ENEMY DRAW FUNCTIONS ──────────────────────────────────────────────────────
function drawVirusEnemy(e) {
  const wx=Math.sin(e.wb)*1.8, wy=Math.cos(e.wb*0.8)*1.4;
  const cx=e.x+wx, cy=e.y+wy;

  // Spike protrusions (GDD: "spike protrusions; reads as angry germ")
  const nSpikes=7;
  ctx.fillStyle=e.rim;
  for (let i=0;i<nSpikes;i++) {
    const a=(i/nSpikes)*Math.PI*2+e.wb*0.25;
    const tip={x:cx+Math.cos(a)*(e.r+8),y:cy+Math.sin(a)*(e.r+8)};
    const left={x:cx+Math.cos(a-0.32)*e.r,y:cy+Math.sin(a-0.32)*e.r};
    const right={x:cx+Math.cos(a+0.32)*e.r,y:cy+Math.sin(a+0.32)*e.r};
    ctx.beginPath(); ctx.moveTo(left.x,left.y); ctx.lineTo(tip.x,tip.y); ctx.lineTo(right.x,right.y); ctx.closePath(); ctx.fill();
  }

  // Body
  ctx.fillStyle=e.clr; ctx.strokeStyle=e.rim; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(cx,cy,e.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.arc(cx-e.r*0.28,cy-e.r*0.3,e.r*0.42,0,Math.PI*2); ctx.fill();
  // Central angry eye
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.arc(cx,cy,e.r*0.38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff6600';
  ctx.beginPath(); ctx.arc(cx-1,cy-1.5,e.r*0.18,0,Math.PI*2); ctx.fill();
  // Angry eyebrow lines
  ctx.strokeStyle='#cc2200'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-e.r*0.3,cy-e.r*0.6); ctx.lineTo(cx-e.r*0.05,cy-e.r*0.45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+e.r*0.3,cy-e.r*0.6); ctx.lineTo(cx+e.r*0.05,cy-e.r*0.45); ctx.stroke();
}

function drawWormEnemy(e) {
  // Direction toward throne for segmented body (GDD: "long segmented worm")
  const dx=TOWER_X-e.x, dy=TOWER_Y-e.y, d=Math.hypot(dx,dy)||1;
  const nx=dx/d, ny=dy/d;
  const nSegs=4, segSpc=e.r*1.35;

  // Segments from tail to head
  for (let s=nSegs-1;s>=0;s--) {
    const ox=e.x-nx*s*segSpc, oy=e.y-ny*s*segSpc;
    const swx=Math.sin(e.wb+s*0.9)*3, swy=Math.cos(e.wb*0.7+s)*2;
    const segR=e.r*(s===0?1:0.84-s*0.04);
    const segClr=s===0?e.clr:darken(e.clr,0.15*s);
    ctx.fillStyle=segClr; ctx.strokeStyle=e.rim; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(ox+swx,oy+swy,segR,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Segment highlight
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(ox+swx-segR*0.25,oy+swy-segR*0.28,segR*0.4,0,Math.PI*2); ctx.fill();
  }
  // Head eyes
  const hwx=Math.sin(e.wb)*2, hwy=Math.cos(e.wb*0.7)*1.5;
  const ew=e.r*0.22, eo=e.r*0.28;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(e.x+hwx-eo,e.y+hwy-eo*0.5,ew,0,Math.PI*2); ctx.arc(e.x+hwx+eo,e.y+hwy-eo*0.5,ew,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a0000';
  ctx.beginPath(); ctx.arc(e.x+hwx-eo,e.y+hwy-eo*0.5,ew*0.52,0,Math.PI*2); ctx.arc(e.x+hwx+eo,e.y+hwy-eo*0.5,ew*0.52,0,Math.PI*2); ctx.fill();
}

function drawBacteriaEnemy(e) {
  // GDD: "Fat bulbous body, short stubby limbs, visible nucleus bump; reads as armored tank"
  const wx=Math.sin(e.wb)*2, wy=Math.cos(e.wb*0.7)*1.5;
  const cx=e.x+wx, cy=e.y+wy;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx,cy+e.r,e.r*0.9,e.r*0.28,0,0,Math.PI*2); ctx.fill();

  // Armor ring (GDD: "Armor — High — reduces all damage by 45%")
  ctx.strokeStyle='#c8b840'; ctx.lineWidth=4;
  ctx.setLineDash([9,5]);
  ctx.beginPath(); ctx.arc(cx,cy,e.r+5,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // Body
  ctx.fillStyle=e.clr; ctx.strokeStyle=e.rim; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(cx,cy,e.r,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Stubby limbs
  const limbA=[-0.55,0.55,Math.PI-0.55,Math.PI+0.55];
  ctx.fillStyle=darken(e.clr,0.28);
  for (const a of limbA) {
    ctx.beginPath();
    ctx.ellipse(cx+Math.cos(a)*(e.r-3),cy+Math.sin(a)*(e.r-3),6,3.5,a,0,Math.PI*2);
    ctx.fill();
  }

  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(cx-e.r*0.28,cy-e.r*0.3,e.r*0.5,0,Math.PI*2); ctx.fill();

  // Nucleus bump (GDD: "visible nucleus bump")
  ctx.fillStyle='#ffdd80'; ctx.strokeStyle='#c8a040'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx+4,cy-4,e.r*0.32,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Nucleus inner dot
  ctx.fillStyle='#aa7020';
  ctx.beginPath(); ctx.arc(cx+4,cy-4,e.r*0.14,0,Math.PI*2); ctx.fill();

  // ARMOR label
  ctx.fillStyle='rgba(200,184,64,0.9)';
  ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText('ARMOR', cx, cy+e.r+16);
}

function drawEnemy(e) {
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(e.x,e.y+e.r,e.r*0.85,e.r*0.26,0,0,Math.PI*2); ctx.fill();

  if      (e.t==='virus')    drawVirusEnemy(e);
  else if (e.t==='worm')     drawWormEnemy(e);
  else if (e.t==='bacteria') drawBacteriaEnemy(e);

  // HP bar (show when damaged)
  if (e.hp<e.maxHp) {
    const bw=e.r*2.6, bh=4.5;
    const bx=e.x-bw/2, by=e.y-e.r-12;
    ctx.fillStyle='#220000'; ctx.fillRect(bx,by,bw,bh);
    const ratio=e.hp/e.maxHp;
    ctx.fillStyle=ratio>0.5?'#cc2200':'#ff5500';
    ctx.fillRect(bx,by,bw*ratio,bh);
    ctx.strokeStyle='#440000'; ctx.lineWidth=0.8; ctx.strokeRect(bx,by,bw,bh);
  }
}

// ── PROJECTILE ────────────────────────────────────────────────────────────────
function drawProj(p) {
  // Trail
  ctx.globalAlpha=0.32; ctx.strokeStyle=p.clr;
  ctx.lineWidth=p.r*2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*0.05,p.y-p.vy*0.05); ctx.stroke();
  ctx.globalAlpha=1;
  // Head
  ctx.fillStyle=p.clr; ctx.strokeStyle='rgba(255,220,100,0.55)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Chunk burst gets extra gross blob look
  if (p.mode==='chunk') {
    ctx.fillStyle='rgba(100,50,0,0.4)';
    ctx.beginPath(); ctx.arc(p.x+p.r*0.3,p.y-p.r*0.3,p.r*0.55,0,Math.PI*2); ctx.fill();
  }
}

// ── PARTICLES + FLOATERS + PANELS ────────────────────────────────────────────
function drawPart(p) {
  if (p.ring) {
    ctx.strokeStyle=p.clr; ctx.lineWidth=3;
    ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1-p.life*0.5),0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=p.clr; ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*Math.max(0.1,p.life),0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawFloater(f) {
  ctx.globalAlpha=f.life;
  ctx.fillStyle=f.clr;
  ctx.font='bold 13px Arial';
  ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=2;
  ctx.strokeText(f.text,f.x,f.y);
  ctx.fillText(f.text,f.x,f.y);
  ctx.globalAlpha=1;
}

function drawImpactPanel(p) {
  ctx.save();
  ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.scale(p.sc,p.sc);
  ctx.globalAlpha=Math.min(1,p.life*1.5);

  // Starburst background
  const nPts=8, outerR=56, innerR=38;
  ctx.fillStyle='#ffd700';
  ctx.beginPath();
  for (let i=0;i<nPts*2;i++) {
    const a=(i/(nPts*2))*Math.PI*2-Math.PI/2;
    const r=i%2===0?outerR:innerR;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#8B4000'; ctx.lineWidth=3; ctx.stroke();

  // Text
  ctx.fillStyle='#1a0800';
  ctx.font='bold 13px "Arial Black",Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(p.text,0,0);

  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Top bar bg
  ctx.fillStyle='rgba(10,4,0,0.92)';
  ctx.fillRect(0,0,W,HUD_H);
  ctx.strokeStyle='#331800'; ctx.lineWidth=1;
  ctx.strokeRect(0,0,W,HUD_H);

  // Wave label
  const isBossWave = waveIdx >= WaveDefs.length-1;
  ctx.fillStyle=isBossWave?'#ff3300':'#ffd700';
  ctx.font='bold 20px "Arial Black",Arial'; ctx.textAlign='left';
  ctx.fillText(isBossWave?`⚠ WAVE ${waveIdx+1}`:`WAVE ${waveIdx+1}`, 38, 28);
  if (isBossWave) {
    ctx.fillStyle='#ff5500'; ctx.font='bold 10px Arial';
    ctx.fillText('FINAL WAVE', 38, 44);
  }

  // Enemy count
  const alive=enemies.length+queues.reduce((s,q)=>s+q.rem,0);
  ctx.fillStyle='#ff6633'; ctx.font='bold 15px Arial'; ctx.textAlign='center';
  ctx.fillText(`👾 ${alive}`, W/2, 26);
  ctx.fillStyle='#665533'; ctx.font='10px Arial';
  ctx.fillText('enemies', W/2, 42);

  // Gold / Slime
  ctx.fillStyle='#ffd700'; ctx.font='bold 20px Arial'; ctx.textAlign='right';
  ctx.fillText(`${gold}💰`, W-12, 28);
  ctx.fillStyle='#886633'; ctx.font='10px Arial';
  ctx.fillText('slime', W-12, 44);

  // Horizontal pressure bar (top HUD)
  const px=38, py=52, pw=W-76, ph=14;
  const ratio=pressure/MAX_P;
  rRect(px,py,pw,ph,4,'#1a0000',null);
  if (ratio>0) {
    const pc=ratio>=1?'#ff0000':ratio>0.75?'#dd3300':ratio>0.5?'#992200':'#661100';
    ctx.save(); ctx.beginPath(); ctx.roundRect(px,py,pw*ratio,ph,4); ctx.clip();
    ctx.fillStyle=pc; ctx.fillRect(px,py,pw,ph);
    // Pulsing segment for pressure sections
    if (ratio>0.25) {
      ctx.fillStyle='rgba(255,200,0,0.12)';
      for (let i=0;i<4;i++) {
        const segW=pw*0.25;
        if (i*0.25<ratio) ctx.fillRect(px+i*segW+2,py+1,segW-4,ph-2);
      }
    }
    ctx.restore();
  }
  rRect(px,py,pw,ph,4,null,'#550000',1.5);
  ctx.fillStyle='rgba(255,160,80,0.9)'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
  ctx.fillText(`💀 PRESSURE  ${Math.round(pressure)}%`, W/2, py+10);

  // VERTICAL PRESSURE BAR — left side (GDD §10.2)
  {
    const bx=PBAR_X, by=PBAR_TOP, bw=PBAR_W, bh=PBAR_BOT-PBAR_TOP;
    rRect(bx,by,bw,bh,4,'#150500',null);
    if (ratio>0) {
      const fillH=bh*ratio;
      const pc=ratio>=1?'#ff0000':ratio>0.75?'#dd2200':ratio>0.5?'#882200':'#440000';
      ctx.save(); ctx.beginPath(); ctx.roundRect(bx,by+bh-fillH,bw,fillH,[0,0,4,4]); ctx.clip();
      ctx.fillStyle=pc; ctx.fillRect(bx,by,bw,bh); ctx.restore();
      // Segment notches
      for (let s=1;s<4;s++) {
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bx,by+bh*(1-s*0.25)); ctx.lineTo(bx+bw,by+bh*(1-s*0.25)); ctx.stroke();
      }
    }
    rRect(bx,by,bw,bh,4,null,'#441100',1.5);
    // Skull at top
    ctx.fillStyle=ratio>=1?'#ff0000':'#553300';
    ctx.font='16px Arial'; ctx.textAlign='center';
    ctx.fillText('💀',bx+bw/2,by-3);
  }

  // Fire mode buttons — bottom zone (GDD §10.1 right thumb zone)
  const btnW=94, btnH=58;
  const btnsY=H-btnH-10;
  const totalW=Modes.length*btnW+(Modes.length-1)*7;
  const btnsX=(W-totalW)/2;

  // Bottom zone bg
  ctx.fillStyle='rgba(8,3,0,0.92)';
  ctx.fillRect(0,FIELD_BOT,W,H-FIELD_BOT);
  ctx.strokeStyle='#331800'; ctx.lineWidth=1;
  ctx.strokeRect(0,FIELD_BOT,W,H-FIELD_BOT);

  // "FIRE MODE" label
  ctx.fillStyle='#553311'; ctx.font='10px Arial'; ctx.textAlign='center';
  ctx.fillText('FIRE MODE',W/2,FIELD_BOT+12);

  for (let i=0;i<Modes.length;i++) {
    const m=Modes[i];
    const bx=btnsX+i*(btnW+7);
    const active=i===modeIdx;
    rRect(bx,btnsY,btnW,btnH,9,
      active?'#6a2200':'rgba(10,4,0,0.9)',
      active?'#ff7700':'#3d1800',
      active?2.5:1.5);
    // Active glow
    if (active) {
      ctx.shadowColor='#ff6600'; ctx.shadowBlur=10;
      ctx.strokeStyle='#ff7700'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.roundRect(bx,btnsY,btnW,btnH,9); ctx.stroke();
      ctx.shadowBlur=0;
    }
    ctx.font='26px Arial'; ctx.textAlign='center';
    ctx.fillText(m.em, bx+btnW/2, btnsY+30);
    ctx.fillStyle=active?'#ffd700':'#886633';
    ctx.font=`bold ${active?11:10}px Arial`;
    ctx.fillText(m.shortName||m.name.split(' ')[0], bx+btnW/2, btnsY+46);
    // DMG/RATE mini stats
    ctx.fillStyle='#554433'; ctx.font='8px Arial';
    ctx.fillText(`DMG:${m.dmg}`, bx+btnW/2-18, btnsY+58);
    ctx.fillText(`×${m.rate}`, bx+btnW/2+18, btnsY+58);
  }
}

// ── RED VIGNETTE ──────────────────────────────────────────────────────────────
function drawVignette() {
  if (vignetteA<=0) return;
  const gr=ctx.createRadialGradient(W/2,H/2,H*0.18,W/2,H/2,H*0.72);
  gr.addColorStop(0,'rgba(0,0,0,0)');
  gr.addColorStop(1,`rgba(210,0,0,${vignetteA})`);
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
}

// ── ULTIMATE FLASH ────────────────────────────────────────────────────────────
function drawUltFlash() {
  if (!ultActive) return;
  const a=Math.min(1,ultTimer/1.5);
  ctx.fillStyle=`rgba(0,220,200,${a*0.18})`;
  ctx.fillRect(0,0,W,H);
  if (ultTimer>1.0) {
    ctx.fillStyle=`rgba(0,255,200,${(ultTimer-1.0)*0.9})`;
    ctx.font='bold 36px "Arial Black",Arial'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,80,60,0.8)'; ctx.lineWidth=4;
    ctx.strokeText('💀 PRESSURE RELEASED! 💀',W/2,H/2);
    ctx.fillText('💀 PRESSURE RELEASED! 💀',W/2,H/2);
    ctx.fillStyle='rgba(0,200,160,0.9)';
    ctx.font='20px Arial';
    ctx.fillText('FLUSH! ALL ENEMIES PURGED',W/2,H/2+36);
  }
}

// ── WAVE CLEAR SCREEN ─────────────────────────────────────────────────────────
function drawWaveClear() {
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  // Panel
  rRect(W/2-160,H/2-100,320,230,14,'rgba(20,8,0,0.95)','#aa5500',2);
  ctx.fillStyle='#ffd700'; ctx.font='bold 38px "Arial Black",Arial'; ctx.textAlign='center';
  ctx.fillText('WAVE CLEAR! 💩',W/2,H/2-52);
  ctx.strokeStyle='#553300'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-120,H/2-32); ctx.lineTo(W/2+120,H/2-32); ctx.stroke();
  ctx.fillStyle='#ff9933'; ctx.font='bold 18px Arial';
  ctx.fillText(`${score} SLIME EARNED`,W/2,H/2-8);
  ctx.fillStyle='#c8a414'; ctx.font='16px Arial';
  ctx.fillText(`Pressure: ${Math.round(pressure)}%`,W/2,H/2+22);
  ctx.fillText(`Wave ${waveIdx+1} of ${WaveDefs.length}`,W/2,H/2+48);
  const prog=1-clearTimer/3.0;
  rRect(W/2-100,H/2+72,200,10,5,'#330a00',null);
  ctx.save(); ctx.beginPath(); ctx.roundRect(W/2-100,H/2+72,200*prog,10,5); ctx.clip();
  ctx.fillStyle='#ffd700'; ctx.fillRect(W/2-100,H/2+72,200,10); ctx.restore();
  ctx.fillStyle='#665533'; ctx.font='13px Arial';
  ctx.fillText('Next wave incoming…',W/2,H/2+100);
}

    ctx.font='22px Arial'; ctx.textAlign='center'; ctx.fillText(m.em,bx+mw/2,my+26);
    ctx.fillStyle='#886633'; ctx.font='bold 10px Arial';
    ctx.fillText(m.shortName||m.name.split(' ')[0],bx+mw/2,my+44);
  }

  // Start button
  const sy=H/2+108;
  rRect(W/2-120,sy,240,68,14,'#8B0000','#ff3300',3);
  ctx.fillStyle='#ffd700'; ctx.font='bold 26px "Arial Black",Arial'; ctx.textAlign='center';
  ctx.fillText('▶  START GAME',W/2,sy+46);
  ctx.fillStyle='rgba(255,100,0,0.3)';
  ctx.beginPath(); ctx.roundRect(W/2-120,sy,240,68,14); ctx.fill();

  ctx.fillStyle='#2a1200'; ctx.font='11px Arial';
  ctx.fillText('v0.2 · Open Source on GitHub',W/2,H-16);
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;

  if (gstate==='wave_clear') {
    clearTimer-=dt;
    // Keep particles alive during break
    for (const p of parts) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.9; p.vy*=0.9; p.life-=p.dec*dt; }
    parts=parts.filter(p=>p.life>0);
    for (const f of floaters) { f.y+=f.vy*dt; f.vy*=0.88; f.life-=f.dec*dt; }
    floaters=floaters.filter(f=>f.life>0);
    for (const p of impactPanels) { p.sc=lerp(p.sc,p.tSc,0.25); p.life-=p.dec*dt; }
    impactPanels=impactPanels.filter(p=>p.life>0);
    if (clearTimer<=0) { gstate='playing'; startWave(waveIdx+1); }
  } else {
    update(dt);
  }

  // Shake transform
  let ox=0, oy=0;
  if (shakeT>0) { ox=(Math.random()-0.5)*shakeI*2; oy=(Math.random()-0.5)*shakeI*2; ctx.save(); ctx.translate(ox,oy); }

  if (gstate==='menu') {
    drawMenu();
  } else {
    drawBg();
    for (const p of parts)        drawPart(p);
    for (const p of projs)        drawProj(p);
    for (const e of enemies)      drawEnemy(e);
    drawTower();
    drawVignette();
    drawUltFlash();
    drawHUD();
    for (const f of floaters)     drawFloater(f);
    for (const p of impactPanels) drawImpactPanel(p);
    if (gstate==='wave_clear') drawWaveClear();
    if (gstate==='game_over')  drawGameOver();
  }

  if (shakeT>0) ctx.restore();
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function toGame(cx,cy) {
  const r=canvas.getBoundingClientRect();
  return {x:(cx-r.left)/scale, y:(cy-r.top)/scale};
}
function onDown(cx,cy) {
  const p=toGame(cx,cy);
  if (gstate==='menu') {
    const sy=H/2+108;
    if (p.x>=W/2-120&&p.x<=W/2+120&&p.y>=sy&&p.y<=sy+68) startGame();
    return;
  }
  if (gstate==='game_over') {
    const ry=H/2+68;
    if (p.x>=W/2-110&&p.x<=W/2+110&&p.y>=ry&&p.y<=ry+60) startGame();
    return;
  }
  // Fire mode buttons
  const btnW=94,btnH=58,btnsY=H-btnH-10;
  const totalW=Modes.length*btnW+(Modes.length-1)*7;
  const btnsX=(W-totalW)/2;
  for (let i=0;i<Modes.length;i++) {
    const bx=btnsX+i*(btnW+7);
    if (p.x>=bx&&p.x<=bx+btnW&&p.y>=btnsY&&p.y<=btnsY+btnH) { modeIdx=i; return; }
  }
  // Ultimate tap (tap near throne at full pressure)
  if (pressure>=MAX_P && dist(p.x,p.y,TOWER_X,TOWER_Y)<100) {
    triggerUltimate(); return;
  }
  // Aim
  if (gstate==='playing') {
    aimActive=true;
    aimAngle=Math.atan2(p.y-PIVOT_Y,p.x-TOWER_X);
  }
}
function onMove(cx,cy) {
  if (!aimActive||gstate!=='playing') return;
  const p=toGame(cx,cy);
  aimAngle=Math.atan2(p.y-PIVOT_Y,p.x-TOWER_X);
}
function onUp() { aimActive=false; }

canvas.addEventListener('mousedown',  e=>onDown(e.clientX,e.clientY));
canvas.addEventListener('mousemove',  e=>onMove(e.clientX,e.clientY));
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();onUp();},{passive:false});

// ── INIT ──────────────────────────────────────────────────────────────────────
function startGame() {
  enemies=[]; projs=[]; parts=[]; floaters=[]; impactPanels=[];
  pressure=0; gold=0; score=0;
  modeIdx=0; fireCd=0;
  aimAngle=-Math.PI/2; aimActive=false;
  shakeT=0; shakeI=0; vignetteA=0;
  ultActive=false; ultTimer=0;
  gstate='playing';
  startWave(0);
}

requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
</body>
